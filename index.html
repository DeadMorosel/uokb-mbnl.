rray(value);", "B": "value.isArray();", "C": "Array.check(value);", "D": "Array.validate(value);", "E": "value.isArray;"}, "answer": "A", "explanation": "Метод Array.isArray(). Единственный надежный способ проверить массив. Обычный typeof скажет, что массив — это объект. А Array.isArray(x) честно ответит true."}, {"num": 82, "question": "Способ проверки, является ли значение объектом в JavaScript", "options": {"A": "typeof value === 'object';", "B": "value.isObject();", "C": "Object.isObject(value);", "D": "value instanceof Object;", "E": "Both A and D"}, "answer": "E", "explanation": "Проверка через typeof x === 'object'. Проверяет, является ли значение объектом. Но нужно помнить про ловушку: для значения null этот сканер тоже вернет \"object\", поэтому обычно дописывают проверку: x !== null."}, {"num": 83, "question": "Способ объединения массивов в JavaScript", "options": {"A": "array1.concat(array2);", "B": "array1.join(array2);", "C": "array1.merge(array2);", "D": "Both A and C", "E": "All of the above"}, "answer": "A", "explanation": "Метод concat() или деструктуризация [...arr1, ...arr2]. Склеивает несколько массивов в один общий большой список."}, {"num": 84, "question": "Способ получения уникальных значений из массива в JavaScript", "options": {"A": "Array.from(new Set(array));", "B": "array.unique();", "C": "array.distinct();", "D": "array.removeDuplicates();", "E": "array.uniques();"}, "answer": "A", "explanation": "Коллекция new Set(). Объект Set умеет хранить только уникальные вещи. Если закинуть туда массив с дубликатами, а потом вернуть обратно в массив, все повторения исчезнут:"}, {"num": 85, "question": "Способ сортировки массива в JavaScript", "options": {"A": "array.sort();", "B": "array.order();", "C": "array.arrange();", "D": "array.sequence();", "E": "array.sorted();"}, "answer": "A", "explanation": "Метод sort(). Сортирует элементы массива. По умолчанию он сортирует их как строки (по алфавиту). Чтобы правильно отсортировать числа, внутрь нужно передать функцию-помощник: arr.sort((a, b) => a - b)."}, {"num": 86, "question": "Способ проверки, является ли значение NaN в JavaScript", "options": {"A": "isNaN(value);", "B": "value.isNaN();", "C": "value === NaN;", "D": "NaN.check(value);", "E": "NaN.is(value);"}, "answer": "A", "explanation": "Функция Number.isNaN(). Специальная проверка для значения NaN (Not a Number / Не число). Обычное сравнение типа x === NaN не работает, потому что в JS NaN не равен даже самому себе."}, {"num": 87, "question": "Способ проверки, является ли значение undefined в JavaScript", "options": {"A": "value === undefined;", "B": "typeof value === 'undefined';", "C": "value.isUndefined();", "D": "value == undefined;", "E": "Both A and B"}, "answer": "E", "explanation": "Сравнение x === undefined. Проверяет, является ли переменная абсолютно пустой и неопределенной (когда её создали, но ничего внутрь не положили)."}, {"num": 88, "question": "Способ проверки, является ли значение null в JavaScript", "options": {"A": "value === null;", "B": "value.isNull();", "C": "value == null;", "D": "value === undefined;", "E": "Both A and C"}, "answer": "E", "explanation": "Сравнение x === null. Проверяет, занулена ли переменная намеренно (когда разработчик сам написал x = null, чтобы показать, что тут пусто)."}, {"num": 89, "question": "Способ проверки, является ли значение числом в JavaScript", "options": {"A": "typeof value === 'number';", "B": "Number.isFinite(value);", "C": "value.isNumber();", "D": "value instanceof Number;", "E": "Both A and B"}, "answer": "E", "explanation": "Проверка typeof x === 'number'. Проверяет, лежит ли в переменной число. Стоит помнить, что NaN технически тоже имеет тип \"number\"."}, {"num": 90, "question": "Способ проверки, является ли значение строкой в JavaScript", "options": {"A": "typeof value === 'string';", "B": "value.isString();", "C": "value instanceof String;", "D": "value.is('string');", "E": "Both A and C"}, "answer": "E", "explanation": "Проверка typeof x === 'string'. Сканирует переменную и подтверждает, что внутри находится обычная текстовая строка."}, {"num": 91, "question": "Способ выполнения GET-запроса с использованием fetch в JavaScript", "options": {"A": "fetch(url).then(response => response.json());", "B": "fetch(url, { method: 'GET' }).then(response => response.json());", "C": "fetch(url, { method: 'POST' }).then(response => response.json());", "D": "Both A and B", "E": "All of the above"}, "answer": "D", "explanation": "Функция fetch(url). Отправляет стандартный GET-запрос на сервер, чтобы притащить оттуда какие-то данные (например, список товаров)."}, {"num": 92, "question": "Способ выполнения POST-запроса с использованием fetch в JavaScript", "options": {"A": "fetch(url, { method: 'POST', body: JSON.stringify(data) }).then(response => response.json());", "B": "fetch(url).then(response => response.json());", "C": "fetch(url, { method: 'GET' }).then(response => response.json());", "D": "fetch(url, { body: JSON.stringify(data) }).then(response => response.json());", "E": "fetch.post(url, { body: JSON.stringify(data) }).then(response => response.json());"}, "answer": "A", "explanation": "fetch с настройками. Чтобы отправить данные на сервер (POST), в fetch вторым аргументом передают настройки: указывают метод 'POST' и тело запроса body:"}, {"num": 93, "question": "Способ получения ответа в формате JSON с использованием fetch в JavaScript", "options": {"A": "fetch(url).then(response => response.json());", "B": "fetch(url).then(response => response.text());", "C": "fetch(url).then(response => response.blob());", "D": "fetch(url).then(response => response.json());", "E": "fetch(url).then(response => response.formData());"}, "answer": "A", "explanation": "Метод .json(). Ответ от fetch нельзя прочитать сразу. Нужно вызвать у ответа метод response.json(), который превратит серверный текст в готовый JS-объект."}, {"num": 94, "question": "Способ обработки ошибок при использовании fetch в JavaScript", "options": {"A": "fetch(url).then(response => response.json()).catch(error => console.error(error));", "B": "fetch(url).catch(error => console.error(error)).then(response => response.json());", "C": "fetch(url).then(response => response.json()).finally(() => console.log('done'));", "D": "fetch(url).catch(error => console.error(error)).finally(() => console.log('done'));", "E": "fetch(url).then(response => response.json()).catch(error => console.log('done'));"}, "answer": "A", "explanation": "Проверка response.ok. Сервер может ответить ошибкой (например, 404), но для fetch сам запрос прошел успешно. Поэтому надо вручную проверять свойство response.ok — если там false, значит на сервере случилась беда."}, {"num": 95, "question": "Способ выполнения асинхронного запроса с использованием async/await в JavaScript", "options": {"A": "async function fetchData() { let response = await fetch(url); let data = await response.json(); return data; }", "B": "function fetchData() { let response = await fetch(url); let data = await response.json(); return data; }", "C": "async function fetchData() { let response = fetch(url); let data = response.json(); return data; }", "D": "async function fetchData() { fetch(url).then(response => response.json()).then(data => return data); }", "E": "function fetchData() { fetch(url).then(response => response.json()).then(data => return data); }"}, "answer": "A", "explanation": "Связка async/await с fetch. Самый красивый способ делать запросы без бесконечных .then():"}, {"num": 96, "question": "Способ чтения файла с использованием FileReader в JavaScript", "options": {"A": "let reader = new FileReader(); reader.readAsText(file);", "B": "let reader = FileReader(); reader.readAsText(file);", "C": "let reader = new FileReader(); reader.readFile(file);", "D": "let reader = FileReader(); reader.readFile(file);", "E": "let reader = new FileReader(); reader.read(file);"}, "answer": "A", "explanation": "Объект new FileReader(). Специальный инструмент в браузере, который умеет брать файлы с компьютера пользователя (например, загруженную картинку) и читать то, что у них внутри."}, {"num": 97, "question": "Способ чтения файла в формате base64 с использованием FileReader в JavaScript", "options": {"A": "let reader = new FileReader(); reader.readAsDataURL(file);", "B": "let reader = new FileReader(); reader.readAsBase64(file);", "C": "let reader = new FileReader(); reader.readAsText(file);", "D": "let reader = FileReader(); reader.readAsDataURL(file);", "E": "let reader = FileReader(); reader.readAsBase64(file);"}, "answer": "A", "explanation": "Метод readAsDataURL(). Команда для FileReader. Она берет файл и превращает его в одну длинную строчку кода (base64). Эту строчку потом можно легко вставить прямо в тег картинки <img src=\"...\">, чтобы показать её на экране."}, {"num": 98, "question": "Способ обработки завершения чтения файла с использованием FileReader в JavaScript", "options": {"A": "reader.onload = function(event) { console.log(event.target.result); }", "B": "reader.onloadend = function(event) { console.log(event.target.result); }", "C": "reader.onloadstart = function(event) { console.log(event.target.result); }", "D": "reader.oncomplete = function(event) { console.log(event.target.result); }", "E": "reader.onfinish = function(event) { console.log(event.target.result); }"}, "answer": "A", "explanation": "Событие onload. У FileReader чтение файлов происходит не мгновенно. Нужно повесить событие reader.onload = () => {}, которое сработает ровно тогда, когда файл полностью прочитается. Результат будет лежать в reader.result."}, {"num": 99, "question": "Способ проверки поддержки File API в браузере", "options": {"A": "if (window.File && window.FileReader && window.FileList && window.Blob) { console.log('File API supported'); }", "B": "if (window.FileReader) { console.log('File API supported'); }", "C": "if (window.File) { console.log('File API supported'); }", "D": "if (window.File && window.FileReader) { console.log('File API supported'); }", "E": "if (window.File && window.FileList) { console.log('File API supported'); }"}, "answer": "A", "explanation": "Проверка через window.File. Чтобы узнать, умеет ли старый браузер пользователя работать с файлами, проверяют наличие встроенных инструментов: if (window.File && window.FileReader)."}, {"num": 100, "question": "Способ создания объекта Blob в JavaScript", "options": {"A": "let blob = new Blob(['content'], { type: 'text/plain' });", "B": "let blob = Blob(['content'], { type: 'text/plain' });", "C": "let blob = new Blob(['content'], 'text/plain');", "D": "let blob = new Blob(['content']);", "E": "let blob = Blob(['content']);"}, "answer": "A", "explanation": "Конструктор new Blob(). Создает сырой кусок бинарных данных (Blob — Binary Large Object). По сути, это позволяет прямо в коде собрать виртуальный файл (например, текстовый или картинку) из строк или массивов:"}, {"num": 101, "question": "Способ создания функции высшего порядка в JavaScript", "options": {"A": "function higherOrderFunction(callback) { return function() { callback(); } }", "B": "function higherOrderFunction(callback) { return () => callback(); }", "C": "const higherOrderFunction = callback => () => callback();", "D": "Both A and C", "E": "All of the above"}, "answer": "E", "explanation": "Функция высшего порядка. Это обычная функция, которая делает одну из двух вещей (или обе): либо принимает другую функцию как аргумент (коробку с командами), либо отдает функцию как результат своей работы."}, {"num": 102, "question": "Способ применения функции к каждому элементу массива в JavaScript", "options": {"A": "array.filter(element => condition);", "B": "array.filter(element => condition(element));", "C": "array.select(element => condition);", "D": "array.select(element => condition(element));", "E": "array.extract(element => condition);"}, "answer": "A", "explanation": "Метод map(). Пробегает по всему массиву, берет каждый элемент, изменяет его по вашему правилу и собирает из результатов абсолютно новый массив такой же длины."}, {"num": 104, "question": "Способ накопления значения из массива в JavaScript", "options": {"A": "array.reduce((accumulator, element) => accumulator + element, initialValue);", "B": "array.accumulate((accumulator, element) => accumulator + element, initialValue);", "C": "array.fold((accumulator, element) => accumulator + element, initialValue);", "D": "Both A and C", "E": "All of the above"}, "answer": "A", "explanation": "Метод every(). Строгий проверяющий. Он смотрит на все элементы массива. Если абсолютно каждый элемент подходит под ваше условие, он выдаст true. Если хотя бы один не подошел — вернет false."}, {"num": 105, "question": "Способ проверки, удовлетворяют ли все элементы массива условию в JavaScript", "options": {"A": "array.every(element => condition);", "B": "array.all(element => condition);", "C": "array.checkAll(element => condition);", "D": "array.every(element => condition(element));", "E": "array.each(element => condition);"}, "answer": "A", "explanation": "Метод Object.assign() или спред-оператор {...obj1, ...obj2}. Копирует все свойства и значения из одного или нескольких объектов в другой, собирая их вместе."}, {"num": 106, "question": "Способ копирования свойств одного объекта в другой в JavaScript", "options": {"A": "Object.assign(target, source);", "B": "target.extend(source);", "C": "target.merge(source);", "D": "Object.copy(target, source);", "E": "target.assign(source);"}, "answer": "A", "explanation": "Метод Object.keys(). Заглядывает внутрь объекта, вытаскивает оттуда только имена всех свойств (ключей) и складывает их в обычный массив строк."}, {"num": 107, "question": "Способ получения массива ключей объекта в JavaScript", "options": {"A": "Object.keys(object);", "B": "object.getKeys();", "C": "Object.getKeys(object);", "D": "object.keys();", "E": "object.keySet();"}, "answer": "A", "explanation": "Метод Object.values(). Делает то же самое, но игнорирует имена свойств и собирает в массив только сами значения, которые за этими свойствами были закреплены."}, {"num": 108, "question": "Способ получения массива значений объекта в JavaScript", "options": {"A": "Object.values(object);", "B": "object.getValues();", "C": "Object.getValues(object);", "D": "object.values();", "E": "object.valueSet();"}, "answer": "A", "explanation": "Метод Object.entries(). Разбирает объект на пары. Он возвращает большой массив, внутри которого лежат маленькие массивы из двух элементов: [ключ, значение]."}, {"num": 109, "question": "Способ получения массива пар ключ-значение объекта в JavaScript", "options": {"A": "Object.entries(object);", "B": "object.getEntries();", "C": "Object.getEntries(object);", "D": "object.entries();", "E": "object.entrySet();"}, "answer": "A", "explanation": "Оператор in или метод hasOwnProperty(). Позволяет быстро узнать, есть ли у объекта конкретное свойство. Запись 'age' in user выдаст true, если внутри объекта user есть свойство age."}, {"num": 110, "question": "Способ проверки наличия свойства в объекте в JavaScript", "options": {"A": "'property' in object;", "B": "object.hasOwnProperty('property');", "C": "object.hasProperty('property');", "D": "Both A and B", "E": "Both B and C"}, "answer": "D", "explanation": "Метод Object.create(proto). Создает совершенно новый пустой объект, но сразу привязывает к нему «родителя» (proto). Если у нового объекта чего-то не найдеся, он автоматически побежит искать это у своего родителя."}, {"num": 111, "question": "Прототипы и наследование", "options": {"A": "Object.create(prototype);", "B": "Object.new(prototype);", "C": "new Object(prototype);", "D": "Object.construct(prototype);", "E": "prototype.createObject();"}, "answer": "A", "explanation": "Оператор instanceof. Проверяет родословную объекта. Команда myObject instanceof MyClass ответит true, если этот объект был создан на основе указанного класса или его предков."}, {"num": 112, "question": "Способ проверки принадлежности объекта к классу в JavaScript", "options": {"A": "object instanceof ClassName;", "B": "ClassName.isPrototypeOf(object);", "C": "object.isInstanceOf(ClassName);", "D": "Both A and B", "E": "Both B and C"}, "answer": "A", "explanation": "Запись через .prototype. Чтобы не копировать метод в каждый новый объект, его привязывают к общему чертежу класса: MyClass.prototype.myMethod = function() {}. Теперь все созданные объекты будут делить этот метод между собой."}, {"num": 113, "question": "Способ добавления метода к прототипу класса в JavaScript", "options": {"A": "ClassName.prototype.methodName = function() {};", "B": "ClassName.methodName = function() {};", "C": "ClassName.prototype.addMethod('methodName', function() {});", "D": "ClassName.addMethod('methodName', function() {});", "E": "ClassName.prototype.methodName = () => {};"}, "answer": "A", "explanation": "Ключевое слово extends. Используется при создании классов, чтобы один класс полностью унаследовал все свойства и методы другого (родительского) класса: class Car extends Vehicle {}."}, {"num": 114, "question": "Способ создания подкласса в JavaScript", "options": {"A": "class SubClass extends SuperClass {}", "B": "class SubClass inherits SuperClass {}", "C": "class SubClass extends SuperClass () {}", "D": "class SubClass inherits SuperClass () {}", "E": "class SubClass implements SuperClass {}"}, "answer": "A", "explanation": "Ключевое слово super. Если внутри подкласса нужно вызвать метод, который остался у родителя, или запустить родительский конструктор, используют слово super: super.method()."}, {"num": 115, "question": "Способ вызова метода родительского класса в JavaScript", "options": {"A": "super.methodName();", "B": "this.super.methodName();", "C": "parent.methodName();", "D": "this.parent.methodName();", "E": "super.methodName;"}, "answer": "A", "explanation": "Функция Symbol(). Создает абсолютно уникальный скрытый маркер-идентификатор. Даже если создать два символа с одинаковым именем, для компьютера они будут абсолютно разными и никогда не совпадут."}, {"num": 116, "question": "Символы и итераторы", "options": {"A": "const symbol = Symbol();", "B": "const symbol = new Symbol();", "C": "const symbol = Symbol.create();", "D": "const symbol = Symbol();", "E": "const symbol = new Symbol();"}, "answer": "A", "explanation": "Свойство [Symbol.iterator]. Чтобы превратить любой ваш объект в список, по которому можно пройтись циклом for...of, внутри объекта нужно создать специальную функцию под этим системным именем."}, {"num": 117, "question": "Способ определения итератора для объекта в JavaScript", "options": {"A": "object[Symbol.iterator] = function*() { yield value; }", "B": "object[Symbol.iterator] = function() { yield value; }", "C": "object.iterator = function*() { yield value; }", "D": "object[Symbol.iterator] = function*() { return value; }", "E": "object.iterator = function() { yield value; }"}, "answer": "A", "explanation": "Цикл for...of. Самый простой способ использовать готовый итератор. Он автоматически берет объект, находит его скрытый итератор и по очереди выдает элементы, пока они не кончатся."}, {"num": 118, "question": "Способ использования итератора для объекта в JavaScript", "options": {"A": "for (let value of object) {}", "B": "for (let value in object) {}", "C": "object.forEach(value => {});", "D": "object.each(value => {});", "E": "object.iterate(value => {});"}, "answer": "A", "explanation": "Текст внутри Symbol('описание'). Когда вы создаете уникальный маркер, в скобках можно написать любой текст-комментарий. Это нужно чисто для разработчика, чтобы не запутаться при чтении кода в консоли."}, {"num": 119, "question": "Способ создания символа с описанием в JavaScript", "options": {"A": "const symbol = Symbol('description');", "B": "const symbol = Symbol.for('description');", "C": "const symbol = new Symbol('description');", "D": "const symbol = Symbol('description');", "E": "const symbol = Symbol.create('description');"}, "answer": "A", "explanation": "Метод Symbol.for('ключ'). Ищет символ в специальном глобальном реестре. Если символ с таким именем уже создавался, он вернет его, а если нет — создаст новый. Так можно делиться одинаковыми символами в разных частях программы."}, {"num": 120, "question": "Способ получения символа из реестра глобальных символов в JavaScript", "options": {"A": "const symbol = Symbol.for('key');", "B": "const symbol = Symbol.get('key');", "C": "const symbol = new Symbol('key');", "D": "const symbol = Symbol('key');", "E": "const symbol = Symbol.create('key');"}, "answer": "A", "explanation": "Запись function*. Функция-генератор объявляется со звездочкой после слова function. Она умеет выдавать значения порциями, останавливая свою работу на ключевых словах yield, а потом продолжать с того же места:"}, {"num": 121, "question": "Generators", "options": {"A": "function* generator() { yield value; }", "B": "function generator*() { yield value; }", "C": "function generator() { yield value; }", "D": "generator function*() { yield value; }", "E": "generator* function() { yield value; }"}, "answer": "A", "explanation": "Вызов функции со звездочкой. Когда мы запускаем myGenerator(), код внутри неё на самом деле еще не начинает выполняться. Функция просто возвращает специальный объект управления — сам генератор."}, {"num": 122, "question": "Способ вызова генератора в JavaScript", "options": {"A": "const gen = generator();", "B": "const gen = generator;", "C": "const gen = new generator();", "D": "const gen = generator.new();", "E": "const gen = generator.create();"}, "answer": "A", "explanation": "Метод .next(). Запускает или продолжает выполнение кода внутри генератора. Код бежит до ближайшего слова yield, останавливается и возвращает объект с выданным значением { value: X, done: false }."}, {"num": 123, "question": "Способ получения значения из генератора в JavaScript", "options": {"A": "gen.next().value;", "B": "gen.value();", "C": "gen.getNext();", "D": "gen.fetch().value;", "E": "gen.advance().value;"}, "answer": "A", "explanation": "Метод .return(). Насильно закрывает генератор в любой момент времени. Он моментально прекращает всю работу внутри функции, как будто она полностью завершилась."}, {"num": 124, "question": "Способ завершения генератора в JavaScript", "options": {"A": "gen.return();", "B": "gen.end();", "C": "gen.stop();", "D": "gen.complete();", "E": "gen.finish();"}, "answer": "A", "explanation": "Проверка свойства done. Каждый раз, когда мы вызываем .next(), компьютер возвращает нам объект. Если генератор полностью допел свою песню и значений больше нет, свойство done сменится с false на true."}, {"num": 125, "question": "Способ обработки завершения генератора в JavaScript", "options": {"A": "gen.return(value);", "B": "gen.end(value);", "C": "gen.stop(value);", "D": "gen.complete(value);", "E": "gen.finish(value);"}, "answer": "A", "explanation": "Конструктор new WeakMap(). Это «слабая» карта. Особая коллекция, где ключами могут быть исключительно объекты, и которая не мешает роботу-уборщику (Garbage Collector) стирать эти объекты из памяти, если они больше нигде в коде не используются."}, {"num": 126, "question": "WeakMap и WeakSet", "options": {"A": "const weakMap = new WeakMap();", "B": "const weakMap = new WeakMap([]);", "C": "const weakMap = WeakMap();", "D": "const weakMap = new WeakMap();", "E": "const weakMap = WeakMap([]);"}, "answer": "A", "explanation": "Метод .set(key, value) для WeakMap. Записывает в коллекцию пару, где key — это обязательно какой-то объект, а value — любые данные, которые мы хотим к нему временно привязать."}, {"num": 127, "question": "Способ добавления элемента в WeakMap в JavaScript", "options": {"A": "weakMap.set(key, value);", "B": "weakMap.put(key, value);", "C": "weakMap.add(key, value);", "D": "weakMap.insert(key, value);", "E": "weakMap.assign(key, value);"}, "answer": "A", "explanation": "Метод .has(key) для WeakMap. Проверяет, лежит ли в этой слабой коллекции секретная информация, привязанная к конкретному объекту-ключу. Возвращает true или false."}, {"num": 128, "question": "Способ проверки наличия ключа в WeakMap в JavaScript", "options": {"A": "weakMap.has(key);", "B": "weakMap.contains(key);", "C": "weakMap.includes(key);", "D": "weakMap.exists(key);", "E": "weakMap.getKey(key);"}, "answer": "A", "explanation": "Метод .delete(key) для WeakMap. Начисто стирает из коллекции объект-ключ и все данные, которые были с ним связаны."}, {"num": 129, "question": "Способ удаления элемента из WeakMap в JavaScript", "options": {"A": "weakMap.delete(key);", "B": "weakMap.remove(key);", "C": "weakMap.clear(key);", "D": "weakMap.erase(key);", "E": "weakMap.discard(key);"}, "answer": "A", "explanation": "Конструктор new WeakSet(). «Слабый» набор. Коллекция, которая может хранить в себе только объекты. Как и WeakMap, она не держит объекты в памяти насильно — если объект удалят из программы, из WeakSet он исчезнет сам."}, {"num": 130, "question": "Способ создания WeakSet в JavaScript", "options": {"A": "const weakSet = new WeakSet();", "B": "const weakSet = new WeakSet([]);", "C": "const weakSet = WeakSet();", "D": "const weakSet = new WeakSet();", "E": "const weakSet = WeakSet([]);"}, "answer": "A", "explanation": "Метод .add(object) для WeakSet. Добавляет новый объект в этот слабый список. Если такой объект там уже лежал, ничего не изменится, так как дубликаты не разрешены."}, {"num": 131, "question": "Способ добавления элемента в WeakSet в JavaScript", "options": {"A": "weakSet.add(value);", "B": "weakSet.set(value);", "C": "weakSet.put(value);", "D": "weakSet.insert(value);", "E": "weakSet.assign(value);"}, "answer": "A", "explanation": "Метод .has(object) для WeakSet. Быстро сканирует коллекцию и отвечает, записан ли прямо сейчас этот конкретный объект в нашем наборе."}, {"num": 132, "question": "Способ проверки наличия элемента в WeakSet в JavaScript", "options": {"A": "weakSet.has(value);", "B": "weakSet.contains(value);", "C": "weakSet.includes(value);", "D": "weakSet.exists(value);", "E": "weakSet.getValue(value);"}, "answer": "A", "explanation": "Метод .delete(object) для WeakSet. Выбрасывает указанный объект из коллекции."}, {"num": 133, "question": "Способ удаления элемента из WeakSet в JavaScript", "options": {"A": "weakSet.delete(value);", "B": "weakSet.remove(value);", "C": "weakSet.clear(value);", "D": "weakSet.erase(value);", "E": "weakSet.discard(value);"}, "answer": "A", "explanation": "Конструктор new Map(). Обычная карта (словарь). В отличие от стандартных объектов, где ключами могут быть только строки, в Map ключом может стать абсолютно всё что угодно: хоть число, хоть массив, хоть функция."}, {"num": 134, "question": "Способ создания Map в JavaScript", "options": {"A": "const map = new Map();", "B": "const map = new Map([]);", "C": "const map = Map();", "D": "const map = new Map();", "E": "const map = Map([]);"}, "answer": "A", "explanation": "Метод .set(key, value) для Map. Добавляет или обновляет элемент в карте по указанному ключу."}, {"num": 135, "question": "Способ добавления элемента в Map в JavaScript", "options": {"A": "map.set(key, value);", "B": "map.put(key, value);", "C": "map.add(key, value);", "D": "map.insert(key, value);", "E": "map.assign(key, value);"}, "answer": "A", "explanation": "Метод .has(key) для Map. Проверяет, существует ли в карте такой ключ, и возвращает ответ в логическом виде (true/false)."}, {"num": 136, "question": "Способ проверки наличия ключа в Map в JavaScript", "options": {"A": "map.has(key);", "B": "map.contains(key);", "C": "map.includes(key);", "D": "map.exists(key);", "E": "map.getKey(key);"}, "answer": "A", "explanation": "Метод .delete(key) для Map. Удаляет из карты элемент по его ключу."}, {"num": 137, "question": "Способ удаления элемента из Map в JavaScript", "options": {"A": "map.delete(key);", "B": "map.remove(key);", "C": "map.clear(key);", "D": "map.erase(key);", "E": "map.discard(key);"}, "answer": "A", "explanation": "Метод .get(key) для Map. Достает и возвращает значение, которое закреплено за этим ключом. Если такого ключа в карте нет, вернет undefined."}, {"num": 138, "question": "Способ получения значения по ключу из Map в JavaScript", "options": {"A": "map.get(key);", "B": "map.fetch(key);", "C": "map.retrieve(key);", "D": "map.obtain(key);", "E": "map.acquire(key);"}, "answer": "A", "explanation": "Конструктор new Set(). Набор уникальных значений. Хранит в себе любые данные, но строго следит, чтобы ни одно значение не повторилось дважды."}, {"num": 139, "question": "Способ создания Set в JavaScript", "options": {"A": "const set = new Set();", "B": "const set = new Set([]);", "C": "const set = Set();", "D": "const set = new Set();", "E": "const set = Set([]);"}, "answer": "A", "explanation": "Метод .add(value) для Set. Пытается положить новое значение в набор. Если такое значение там уже есть, команда просто проигнорирует действие."}, {"num": 140, "question": "Способ добавления элемента в Set в JavaScript", "options": {"A": "set.add(value);", "B": "set.set(value);", "C": "set.put(value);", "D": "set.insert(value);", "E": "set.assign(value);"}, "answer": "A", "explanation": "Метод .has(value) для Set. Проверяет, лежит ли уже такое значение внутри набора. Работает невероятно быстро, гораздо быстрее поиска в обычном массиве."}, {"num": 141, "question": "Способ проверки наличия элемента в Set в JavaScript", "options": {"A": "set.has(value);", "B": "set.contains(value);", "C": "set.includes(value);", "D": "set.exists(value);", "E": "set.getValue(value);"}, "answer": "A", "explanation": "Метод .delete(value) для Set. Находит и удаляет конкретное значение из набора."}, {"num": 142, "question": "Способ удаления элемента из Set в JavaScript", "options": {"A": "set.delete(value);", "B": "set.remove(value);", "C": "set.clear(value);", "D": "set.erase(value);", "E": "set.discard(value);"}, "answer": "A", "explanation": "Деструктуризация [...mySet]. Набор Set — это не массив, у него нет индексов вроде [0]. Чтобы превратить его в обычный массив, его элементы «рассыпают» внутри квадратных скобок с помощью трех точек."}, {"num": 143, "question": "Способ преобразования Set в массив в JavaScript", "options": {"A": "Array.from(set);", "B": "set.toArray();", "C": "set.asArray();", "D": "set.convertToArray();", "E": "set.toArray();"}, "answer": "A", "explanation": "Ключевое слово class. Современный красивый шаблон (чертеж) для создания однотипных объектов со своими свойствами и методами:"}, {"num": 144, "question": "Современные возможности ES6+", "options": {"A": "class MyClass {}", "B": "class MyClass() {}", "C": "MyClass {}", "D": "MyClass() {}", "E": "class create MyClass {}"}, "answer": "A", "explanation": "Слово async. Ставится перед объявлением функции, сообщая системе, что внутри будет происходить какая-то асинхронная магия (например, ожидание ответа от сервера)."}, {"num": 145, "question": "Способ объявления асинхронной функции в JavaScript", "options": {"A": "async function myFunction() {}", "B": "function async myFunction() {}", "C": "async myFunction() {}", "D": "function myFunction async() {}", "E": "myFunction async function() {}"}, "answer": "A", "explanation": "Инструкция import. Позволяет подключить к твоему текущему коду функции, классы или переменные, которые лежат в другом изолированном файле-модуле."}, {"num": 146, "question": "Способ использования модуля в JavaScript", "options": {"A": "import module from 'module';", "B": "include module from 'module';", "C": "require module from 'module';", "D": "import 'module' as module;", "E": "require 'module';"}, "answer": "A", "explanation": "Инструкция export. Дописывается перед функцией в файле, чтобы другие файлы имели право импортировать её к себе."}, {"num": 147, "question": "Способ экспорта функции из модуля в JavaScript", "options": {"A": "export function myFunction() {}", "B": "export myFunction() {}", "C": "function myFunction() { export default; }", "D": "function myFunction() { export; }", "E": "export default myFunction() {}"}, "answer": "A", "explanation": "Ключевые слова let и const. Создают переменные, которые заперты внутри своего блока видимости (между ближайшими фигурными скобками {})."}, {"num": 148, "question": "Способ объявления переменной, видимой только внутри блока кода, в JavaScript", "options": {"A": "let variable;", "B": "var variable;", "C": "const variable;", "D": "block variable;", "E": "static variable;"}, "answer": "A", "explanation": "Знак равенства в аргументах. Позволяет указать значение по умолчанию прямо при создании функции. Если при вызове функции этот аргумент забудут передать, компьютер сам возьмет дефолтное значение:"}, {"num": 149, "question": "Способ использования параметров по умолчанию в функции в JavaScript", "options": {"A": "function myFunction(param = 'default') {}", "B": "function myFunction('default' = param) {}", "C": "function myFunction(default param) {}", "D": "function myFunction(param == 'default') {}", "E": "function myFunction(param === 'default') {}"}, "answer": "A", "explanation": "Стрелочный синтаксис () => {}. Компактный способ объявить функцию без использования длинного слова function. К тому же, у таких функций нет своего контекста this."}, {"num": 150, "question": "Способ создания стрелочной функции в JavaScript", "options": {"A": "const myFunction = () => {};", "B": "const myFunction = function() {};", "C": "function myFunction() => {};", "D": "myFunction = () => {};", "E": "function => myFunction() {};"}, "answer": "A", "explanation": "Тег <a> (HTML). Это уже вопрос из верстки (HTML). Для создания ссылки используется тег <a>, а сам адрес ссылки пишется в его атрибуте href: <a href=\"https://google.com\">Ссылка</a>."}, {"num": 151, "question": "Тег, используемый для создания гиперссылки", "options": {"A": "<a>", "B": "<link>", "C": "<href>", "D": "<hyperlink>", "E": "<url>"}, "answer": "A", "explanation": "Атрибут src. Пишется внутри тега <img>, чтобы указать путь к файлу картинки: <img src=\"photo.jpg\">."}, {"num": 152, "question": "Атрибут, используемый для задания URL-адреса изображения в теге <img>", "options": {"A": "href", "B": "url", "C": "link", "D": "src", "E": "img"}, "answer": "D", "explanation": "Тег <h1>. Создает самый главный, большой и важный заголовок на странице."}, {"num": 153, "question": "Тег, используемый для создания заголовка первого уровня", "options": {"A": "<header>", "B": "<h1>", "C": "<title>", "D": "<head>", "E": "<h2>"}, "answer": "B", "explanation": "Атрибут alt. Альтернативный текст для картинки. Показывается, если картинка сломалась, и читается роботами для слепых: <img alt=\"Описание\">."}, {"num": 154, "question": "Атрибут, используемый для задания альтернативного текста для изображения", "options": {"A": "alt", "B": "title", "C": "description", "D": "caption", "E": "text"}, "answer": "A", "explanation": "Тег <ul>. Создает маркированный (ненумерованный) список, где элементы отмечаются точками."}, {"num": 155, "question": "Тег, используемый для создания ненумерованного списка", "options": {"A": "<ol>", "B": "<ul>", "C": "<li>", "D": "<dl>", "E": "<list>"}, "answer": "B", "explanation": "Свойство color. В CSS отвечает за перекрашивание самого текста (например, color: red;)."}, {"num": 156, "question": "Свойство CSS, используемое для задания цвета текста", "options": {"A": "font-color", "B": "text-color", "C": "color", "D": "text-style", "E": "font-style"}, "answer": "C", "explanation": "Свойство font-family. В CSS используется для выбора конкретного шрифта (например, Arial или Roboto)."}, {"num": 157, "question": "Способ задать шрифт для текста в CSS", "options": {"A": "font-family", "B": "font-type", "C": "text-font", "D": "font-style", "E": "text-family"}, "answer": "A", "explanation": "Тег <table>. Главный тег-коробка, внутри которого собирается вся HTML-таблица."}, {"num": 158, "question": "Тег, используемый для создания таблицы", "options": {"A": "<table>", "B": "<tab>", "C": "<grid>", "D": "<tbl>", "E": "<t>"}, "answer": "A", "explanation": "Атрибут colspan. Пишется у ячейки таблицы, чтобы растянуть её по горизонтали на несколько колонок вширь."}, {"num": 159, "question": "Атрибут, используемый для объединения ячеек таблицы по горизонтали", "options": {"A": "rowspan", "B": "colspan", "C": "merge", "D": "combine", "E": "span"}, "answer": "B", "explanation": "Свойство margin. В CSS задает внешние отступы, то есть расталкивает соседние элементы вокруг текущего блока."}, {"num": 160, "question": "Свойство CSS, используемое для задания внешнего отступа элемента", "options": {"A": "padding", "B": "margin", "C": "border", "D": "spacing", "E": "gap"}, "answer": "B", "explanation": "Тег <tr>. Создает горизонтальную строку (ряд) внутри таблицы."}, {"num": 161, "question": "Тег, используемый для создания строки таблицы", "options": {"A": "<td>", "B": "<tr>", "C": "<th>", "D": "<row>", "E": "<table-row>"}, "answer": "B", "explanation": "Свойство font-weight: bold;. В CSS делает текст жирным."}, {"num": 162, "question": "Способ задать жирный шрифт в CSS", "options": {"A": "font-weight", "B": "font-style", "C": "font-bold", "D": "text-weight", "E": "text-bold"}, "answer": "A", "explanation": "Тег <p>. Создает обычный текстовый абзац (параграф) с небольшим отступом сверху и снизу."}, {"num": 163, "question": "Тег, используемый для создания параграфа", "options": {"A": "<par>", "B": "<p>", "C": "<paragraph>", "D": "<pg>", "E": "<text>"}, "answer": "B", "explanation": "Атрибут href. Главный атрибут тега <a>, куда записывается сам адрес ссылки: <a href=\"https://site.com\">."}, {"num": 164, "question": "Атрибут, используемый для задания ссылки в теге <a>", "options": {"A": "link", "B": "href", "C": "src", "D": "url", "E": "target"}, "answer": "B", "explanation": "Свойство padding. В CSS создает внутренние отступы, то есть увеличивает воздух внутри самого элемента (от текста до его рамки)."}, {"num": 165, "question": "Свойство CSS, используемое для задания внутреннего отступа элемента", "options": {"A": "margin", "B": "padding", "C": "border", "D": "spacing", "E": "gap"}, "answer": "B", "explanation": "Тег <td>. Создает стандартную рабочую ячейку с данными внутри строки таблицы."}, {"num": 166, "question": "Тег, используемый для создания ячейки таблицы", "options": {"A": "<td>", "B": "<tr>", "C": "<th>", "D": "<cell>", "E": "<table-data>"}, "answer": "A", "explanation": "Свойство width. В CSS задает ширину элемента (в пикселях, процентах и т.д.)."}, {"num": 167, "question": "Свойство CSS, используемое для задания ширины элемента", "options": {"A": "width", "B": "size", "C": "height", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Тег <ol>. Создает нумерованный список, где элементы автоматически получают цифры 1, 2, 3 и далее."}, {"num": 168, "question": "Тег, используемый для создания нумерованного списка", "options": {"A": "<ul>", "B": "<ol>", "C": "<li>", "D": "<dl>", "E": "<list>"}, "answer": "B", "explanation": "Атрибут target. Указывает, где открыть ссылку. Например, target=\"_blank\" заставит ссылку открыться в новой вкладке браузера."}, {"num": 169, "question": "Атрибут, используемый для задания целевой области ссылки", "options": {"A": "target", "B": "href", "C": "link", "D": "url", "E": "dest"}, "answer": "A", "explanation": "Свойство height. В CSS задает высоту элемента."}, {"num": 170, "question": "Свойство CSS, используемое для задания высоты элемента", "options": {"A": "height", "B": "size", "C": "width", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Тег <h2>. Заголовок второго уровня. Чуть меньше, чем <h1>, используется для разделения текста на разделы."}, {"num": 171, "question": "Тег, используемый для создания заголовка второго уровня", "options": {"A": "<h2>", "B": "<h1>", "C": "<h3>", "D": "<title>", "E": "<header>"}, "answer": "A", "explanation": "Атрибут id. Дает элементу HTML уникальное имя-паспорт на всей странице, чтобы к нему можно было легко обратиться через CSS или JS."}, {"num": 172, "question": "Атрибут, используемый для задания идентификатора элемента", "options": {"A": "class", "B": "id", "C": "name", "D": "type", "E": "ref"}, "answer": "B", "explanation": "Свойство font-family (или font-style для курсива). Обычно тип и семейство шрифта настраивают через font-family."}, {"num": 173, "question": "Свойство CSS, используемое для задания типа шрифта", "options": {"A": "font-style", "B": "font-family", "C": "text-font", "D": "font-type", "E": "text-style"}, "answer": "B", "explanation": "Тег <img>. Одиночный тег, который просто вставляет картинку на страницу."}, {"num": 174, "question": "Тег, используемый для вставки изображения", "options": {"A": "<image>", "B": "<img>", "C": "<picture>", "D": "<src>", "E": "<graphic>"}, "answer": "B", "explanation": "Атрибут title. Задает всплывающую подсказку. Если навести мышку на элемент и подождать, этот текст появится в маленьком окошке."}, {"num": 175, "question": "Атрибут, используемый для задания текста всплывающей подсказки", "options": {"A": "tooltip", "B": "alt", "C": "title", "D": "hint", "E": "text"}, "answer": "C", "explanation": "Свойство font-style. В CSS используется, чтобы сделать текст курсивным (font-style: italic;)."}, {"num": 176, "question": "Свойство CSS, используемое для задания стиля текста", "options": {"A": "font-style", "B": "text-decorationпойск", "C": "text-style", "D": "font-decoration", "E": "text-transform"}, "answer": "B", "explanation": "Тег <form>. Создает область формы, в которую собираются поля ввода, кнопки и чекбоксы для отправки данных на сервер."}, {"num": 177, "question": "Тег, используемый для создания формы", "options": {"A": "<form>", "B": "<input>", "C": "<textarea>", "D": "<button>", "E": "<fieldset>"}, "answer": "A", "explanation": "Атрибут method. Указывает форме, как именно отправлять данные: тайно (method=\"POST\") или прямо в адресной строке (method=\"GET\")."}, {"num": 178, "question": "Атрибут, используемый для задания метода отправки данных формы", "options": {"A": "method", "B": "action", "C": "submit", "D": "send", "E": "post"}, "answer": "A", "explanation": "Свойство margin-bottom. Задает внешний отступ исключительно снизу элемента."}, {"num": 179, "question": "Свойство CSS, используемое для задания нижнего отступа элемента", "options": {"A": "padding-bottom", "B": "margin-bottom", "C": "border-bottom", "D": "bottom", "E": "gap-bottom"}, "answer": "B", "explanation": "Тег <button>. Создает обычную кликабельную кнопку на странице."}, {"num": 180, "question": "Тег, используемый для создания кнопки", "options": {"A": "<input>", "B": "<button>", "C": "<submit>", "D": "<click>", "E": "<control>"}, "answer": "B", "explanation": "Атрибут name. Дает имя полю ввода в форме, чтобы сервер понял, какое именно значение к нему пришло (например, name=\"email\")."}, {"num": 181, "question": "Атрибут, используемый для задания имени элемента формы", "options": {"A": "id", "B": "name", "C": "class", "D": "value", "E": "type"}, "answer": "B", "explanation": "Свойство margin-left. Задает внешний отступ исключительно с левой стороны элемента."}, {"num": 182, "question": "Свойство CSS, используемое для задания левого отступа элемента", "options": {"A": "padding-left", "B": "margin-left", "C": "border-left", "D": "left", "E": "gap-left"}, "answer": "B", "explanation": "Тег <video>. Используется для встраивания видеоплеера прямо на веб-страницу."}, {"num": 183, "question": "Тег, используемый для вставки видеоконтента", "options": {"A": "<video>", "B": "<media>", "C": "<source>", "D": "<embed>", "E": "<file>"}, "answer": "A", "explanation": "Атрибут width. Прямо в HTML-теге <img> или <video> задает ширину без использования CSS: <img width=\"300\">."}, {"num": 184, "question": "Атрибут, используемый для задания ширины изображения", "options": {"A": "width", "B": "size", "C": "height", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Свойство margin-right. Задает внешний отступ исключительно с правой стороны элемента."}, {"num": 185, "question": "Свойство CSS, используемое для задания правого отступа элемента", "options": {"A": "padding-right", "B": "margin-right", "C": "border-right", "D": "right", "E": "gap-right"}, "answer": "B", "explanation": "Тег <textarea>. Создает большое многострочное поле для ввода длинного текста (например, для комментариев)."}, {"num": 186, "question": "Тег, используемый для создания области ввода текста", "options": {"A": "<textarea>", "B": "<input>", "C": "<form>", "D": "<textbox>", "E": "<field>"}, "answer": "A", "explanation": "Атрибут maxlength. Ставит жесткий лимит на количество букв, которые пользователь может вбить в поле ввода."}, {"num": 187, "question": "Атрибут, используемый для задания максимального числа символов в поле ввода", "options": {"A": "maxlength", "B": "maxchars", "C": "limit", "D": "chars", "E": "maxsize"}, "answer": "A", "explanation": "Свойство font-family. Указывает список шрифтов для текста в CSS."}, {"num": 188, "question": "Свойство CSS, используемое для задания семейства шрифтов", "options": {"A": "font-family", "B": "font-style", "C": "font-type", "D": "text-font", "E": "text-style"}, "answer": "A", "explanation": "Тег <select>. Создает выпадающий список (выпадашку), внутри которого варианты выбора прописываются тегами <option>."}, {"num": 189, "question": "Тег, используемый для создания выпадающего списка", "options": {"A": "<select>", "B": "<list>", "C": "<dropdown>", "D": "<menu>", "E": "<option>"}, "answer": "A", "explanation": "Тег <legend>. Задает текстовый заголовок для группы элементов формы, которые объединены тегом <fieldset>."}, {"num": 190, "question": "Атрибут, используемый для задания заголовка группы элементов в форме", "options": {"A": "title", "B": "name", "C": "label", "D": "group", "E": "header"}, "answer": "C", "explanation": "Свойство border-width. В CSS регулирует, насколько толстой будет рамка вокруг элемента."}, {"num": 191, "question": "Свойство CSS, используемое для задания толщины границы", "options": {"A": "border-width", "B": "border-thickness", "C": "line-width", "D": "line-thickness", "E": "outline-width"}, "answer": "A", "explanation": "Тег <ul>. Создает список, где каждый пункт <lI> помечается маркером-точкой."}, {"num": 192, "question": "Тег, используемый для создания маркированного списка", "options": {"A": "<ol>", "B": "<ul>", "C": "<li>", "D": "<dl>", "E": "<list>"}, "answer": "B", "explanation": "Атрибут color. Старый, устаревший атрибут для тега <font>, который раньше использовался для покраски текста до появления CSS."}, {"num": 193, "question": "Атрибут, используемый для задания цвета текста в теге <font>", "options": {"A": "color", "B": "text-color", "C": "font-color", "D": "style", "E": "font-style"}, "answer": "A", "explanation": "Свойство text-align. Выравнивает текст внутри блока (например, по центру center или по правому краю right)."}, {"num": 194, "question": "Свойство CSS, используемое для задания выравнивания текста", "options": {"A": "text-align", "B": "align-text", "C": "text-position", "D": "position", "E": "text-style"}, "answer": "A", "explanation": "Атрибут action. Указывает форме адрес (URL) того скрипта на сервере, куда нужно отослать все заполненные данные."}, {"num": 195, "question": "Атрибут, используемый для задания адреса, на который отправляются данные формы", "options": {"A": "action", "B": "submit", "C": "target", "D": "url", "E": "link"}, "answer": "A", "explanation": "Свойство background-color. Задает цвет фона для элемента."}, {"num": 196, "question": "Свойство CSS, используемое для задания фонового цвета элемента", "options": {"A": "background-color", "B": "color", "C": "background", "D": "bgcolor", "E": "bg-color"}, "answer": "A", "explanation": "Атрибут align (в HTML) или свойство text-align (в CSS). Позволяет выровнять текст внутри ячейки таблицы."}, {"num": 197, "question": "Атрибут, используемый для задания выравнивания содержимого ячейки таблицы", "options": {"A": "align", "B": "valign", "C": "alignment", "D": "vertical-align", "E": "content-align"}, "answer": "D", "explanation": "Свойство border-style. В CSS выбирает вид рамки: сплошная (solid), пунктирная (dashed), точечная (dotted) и т.д."}, {"num": 198, "question": "Свойство CSS, используемое для задания стиля рамки", "options": {"A": "border-style", "B": "border", "C": "outline", "D": "frame", "E": "border-width"}, "answer": "A", "explanation": "Теги от <h2> до <h6>. Любой из этих тегов создает подзаголовок разного уровня и размера в зависимости от вложенности."}, {"num": 199, "question": "Тег, используемый для создания подзаголовка", "options": {"A": "<h2>", "B": "<h1>", "C": "<h3>", "D": "<title>", "E": "<header>"}, "answer": "C", "explanation": "Атрибут align. Старый HTML-атрибут для выравнивания картинки относительно текста (сейчас для этого используют CSS-свойство float или флексы)."}, {"num": 200, "question": "Атрибут, используемый для задания выравнивания изображения в теге <img>", "options": {"A": "align", "B": "valign", "C": "alignment", "D": "vertical-align", "E": "image-align"}, "answer": "A", "explanation": "Свойство border-width. Напрямую управляет толщиной рамки (границы) элемента в CSS."}, {"num": 201, "question": "Свойство CSS, используемое для задания ширины границы", "options": {"A": "border-width", "B": "border-thickness", "C": "line-width", "D": "line-thickness", "E": "outline-width"}, "answer": "A", "explanation": "Тег <a> внутри тега <li>. Чтобы сделать ссылку элементом списка, тег ссылки просто кладут внутрь тега элемента списка: <li><a href=\"#\">Ссылка</a></li>."}, {"num": 202, "question": "Тег, используемый для создания ссылки в списке элементов", "options": {"A": "<link>", "B": "<a>", "C": "<list>", "D": "<url>", "E": "<href>"}, "answer": "B", "explanation": "Атрибут align (в HTML) или свойство text-align (в CSS). Позволяет сдвинуть текст внутри ячейки таблицы влево, вправо или поставить по центру."}, {"num": 203, "question": "Атрибут, используемый для задания выравнивания текста в ячейке таблицы", "options": {"A": "align", "B": "valign", "C": "alignment", "D": "vertical-align", "E": "text-align"}, "answer": "E", "explanation": "Свойство list-style-type. В CSS меняет вид маркера у списка. Можно сделать его квадратом (square), круглым контуром (circle) или вообще убрать (none)."}, {"num": 204, "question": "Свойство CSS, используемое для задания стиля маркера списка", "options": {"A": "list-style-type", "B": "list-type", "C": "marker-style", "D": "marker-type", "E": "style-type"}, "answer": "A", "explanation": "Тег <li>. Создает один конкретный пункт (строку) внутри любого списка — как нумерованного (<ol>), так и маркированного (<ul>)."}, {"num": 205, "question": "Тег, используемый для создания элемента списка", "options": {"A": "<li>", "B": "<list>", "C": "<ul>", "D": "<item>", "E": "<element>"}, "answer": "A", "explanation": "Атрибут align (устаревший) или свойства margin: auto / text-align (в CSS). Помогают выровнять сам блочный элемент по левому, правому краю или по центру страницы."}, {"num": 206, "question": "Атрибут, используемый для задания горизонтального выравнивания элемента", "options": {"A": "align", "B": "valign", "C": "alignment", "D": "horizontal-align", "E": "text-align"}, "answer": "A", "explanation": "Свойство border-width (или border-top-width и т.д.). В CSS под высотой или толщиной границы всегда понимается её толщина в пикселях."}, {"num": 207, "question": "Свойство CSS, используемое для задания высоты границы", "options": {"A": "border-height", "B": "border-thickness", "C": "line-height", "D": "line-thickness", "E": "outline-height"}, "answer": "C", "explanation": "Тег <h3>. Заголовок третьего уровня. Он меньше, чем <h2>, и используется для мелких подразделов внутри статей или блоков."}, {"num": 208, "question": "Тег, используемый для создания заголовка третьего уровня", "options": {"A": "<h3>", "B": "<h2>", "C": "<h1>", "D": "<title>", "E": "<header>"}, "answer": "A", "explanation": "Атрибут height. Пишется прямо в теге картинки, чтобы задать её высоту в пикселях без CSS: <img height=\"200\">."}, {"num": 209, "question": "Атрибут, используемый для задания высоты изображения в теге <img>", "options": {"A": "height", "B": "size", "C": "width", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Свойство background-color. В CSS заливает задний фон элемента выбранным цветом."}, {"num": 210, "question": "Свойство CSS, используемое для задания цвета фона элемента", "options": {"A": "background-color", "B": "color", "C": "background", "D": "bgcolor", "E": "bg-color"}, "answer": "A", "explanation": "Тег <u> или тег <ins>. Делает текст подчеркнутым. В современном вебе для этого чаще используют CSS-свойство text-decoration: underline;."}, {"num": 211, "question": "Тег, используемый для создания подчеркнутого текста", "options": {"A": "<underline>", "B": "<u>", "C": "<text>", "D": "<style>", "E": "<highlight>"}, "answer": "B", "explanation": "Атрибут bordercolor (старый HTML) или свойство border-color (в CSS). Красит рамку вокруг элемента в нужный цвет."}, {"num": 212, "question": "Атрибут, используемый для задания цвета границы элемента", "options": {"A": "padding", "B": "margin", "C": "border", "D": "spacing", "E": "gap"}, "answer": "A", "explanation": "Тег <option>. Создает одну строчку-вариант внутри выпадающего списка <select>."}, {"num": 213, "question": "Тег, используемый для создания списка опций в выпадающем списке", "options": {"A": "<option>", "B": "<select>", "C": "<list>", "D": "<dropdown>", "E": "<menu>"}, "answer": "A", "explanation": "Атрибут width (в HTML) или свойство width (в CSS). Задает ширину конкретной ячейки таблицы."}, {"num": 214, "question": "Атрибут, используемый для задания ширины ячейки таблицы", "options": {"A": "width", "B": "size", "C": "height", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Свойство position. В CSS управляет тем, как элемент сидит на странице (например, relative сдвигает относительно себя, absolute — относительно родителя, а fixed прибивает к экрану)."}, {"num": 215, "question": "Свойство CSS, используемое для задания положения элемента относительно окружающих элементов", "options": {"A": "position", "B": "align", "C": "placement", "D": "location", "E": "orientation"}, "answer": "A", "explanation": "Атрибут face. Древний HTML-атрибут для тега <font>, в который прописывали имя шрифта (сейчас полностью заменено на CSS font-family)."}, {"num": 216, "question": "Атрибут, используемый для задания шрифта в теге <font>", "options": {"A": "font-family", "B": "font-style", "C": "font-type", "D": "text-font", "E": "text-style"}, "answer": "A", "explanation": "Свойство margin-top. В CSS делает внешний отступ исключительно сверху элемента, отодвигая его от верхнего соседа."}, {"num": 217, "question": "Свойство CSS, используемое для задания отступа сверху элемента", "options": {"A": "padding-top", "B": "margin-top", "C": "border-top", "D": "top", "E": "gap-top"}, "answer": "A", "explanation": "Тег <div> с рамкой или тег <fieldset> для форм. В HTML нет отдельного тега «рамка», любой блок превращается в рамку с помощью CSS-свойства border."}, {"num": 218, "question": "Тег, используемый для создания рамки вокруг элемента", "options": {"A": "<border>", "B": "<outline>", "C": "<frame>", "D": "<box>", "E": "<border-box>"}, "answer": "B", "explanation": "Атрибут width для тега <colgroup> или <col>. Позволяет одной строчкой задать ширину сразу для целой колонки или группы колонок в таблице."}, {"num": 219, "question": "Атрибут, используемый для задания ширины группы ячеек таблицы", "options": {"A": "colspan", "B": "rowspan", "C": "merge", "D": "combine", "E": "span"}, "answer": "A", "explanation": "Свойство border-style. В CSS выбирает тип линии для рамки: сплошная (solid), пунктир (dashed) или точки (dotted)."}, {"num": 220, "question": "Свойство CSS, используемое для задания стиля линии", "options": {"A": "line-style", "B": "border-style", "C": "outline-style", "D": "line-type", "E": "style-line"}, "answer": "B", "explanation": "Тег <select multiple>. Чтобы сделать выбор множественным (когда можно зажать Ctrl и выбрать несколько строк), к обычному тегу выпадающего списка добавляют атрибут multiple, а опции внутри так же пишутся через <option>."}, {"num": 221, "question": "Тег, используемый для создания списка опций в множественном выборе", "options": {"A": "<option>", "B": "<select>", "C": "<list>", "D": "<dropdown>", "E": "<multiselect>"}, "answer": "B", "explanation": "Атрибут bgcolor для тега <body> (устарел) или CSS-свойство background-color для селектора body. Напрямую красит весь задний фон веб-страницы."}, {"num": 222, "question": "Атрибут, используемый для задания цвета фона страницы", "options": {"A": "background-color", "B": "color", "C": "background", "D": "bgcolor", "E": "page-color"}, "answer": "A", "explanation": "Свойство height (в CSS) или атрибут rows (в HTML). Для тега <textarea> можно задать высоту либо в пикселях через CSS, либо указать количество видимых строк через rows=\"10\"."}, {"num": 224, "question": "ANSWER: B", "options": {"A": "<anchor>", "B": "<a>", "C": "<link>", "D": "<href>", "E": "<url>"}, "answer": "A", "explanation": "Атрибут height (в HTML) или свойство height (в CSS). Задает высоту ячейки таблицы."}, {"num": 225, "question": "Атрибут, используемый для задания высоты ячейки таблицы", "options": {"A": "height", "B": "size", "C": "width", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Свойство border-width. В CSS отвечает за толщину линий рамки."}, {"num": 226, "question": "Свойство CSS, используемое для задания толщины линии", "options": {"A": "line-width", "B": "border-width", "C": "outline-width", "D": "thickness", "E": "width"}, "answer": "A", "explanation": "Атрибут bgcolor (устарел) или CSS-свойство background-color. Задает фоновый цвет для конкретной ячейки таблицы."}, {"num": 227, "question": "Атрибут, используемый для задания цвета фона ячейки таблицы", "options": {"A": "background-color", "B": "bgcolor", "C": "color", "D": "bg-color", "E": "cell-color"}, "answer": "B", "explanation": "Свойство width (в CSS) или атрибут size (в HTML). Для обычного инпута <input type=\"text\"> ширину можно ограничить через CSS или задать ширину в символах через size=\"20\"."}, {"num": 228, "question": "Свойство CSS, используемое для задания ширины текстового поля", "options": {"A": "width", "B": "size", "C": "input-width", "D": "text-size", "E": "field-width"}, "answer": "A", "explanation": "Тег <hr>. Одиночный тег, который проводит серую горизонтальную линию-разделитель на всю ширину блока."}, {"num": 229, "question": "Тег, используемый для создания горизонтальной линии на веб-странице", "options": {"A": "<hr>", "B": "<line>", "C": "<horizontal>", "D": "<divider>", "E": "<rule>"}, "answer": "A", "explanation": "Атрибут height=\"X%\". Высота картинки в процентах пишется прямо в кавычках. Картинка будет менять размер в зависимости от высоты родительского блока."}, {"num": 230, "question": "Атрибут, используемый для задания высоты изображения в процентах в теге <img>", "options": {"A": "height", "B": "size", "C": "width", "D": "length", "E": "extent"}, "answer": "A", "explanation": "Свойство background. В CSS это универсальное свойство, в которое можно записать сразу всё: и цвет фона, и картинку, и то, как она будет повторяться."}, {"num": 231, "question": "Свойство CSS, используемое для задания стиля фона элемента", "options": {"A": "background-style", "B": "style-background", "C": "background", "D": "bg-style", "E": "style-bg"}, "answer": "C", "explanation": "Свойство vertical-align (в CSS) или атрибут valign (в HTML). Выравнивает содержимое (например, текст в ячейке таблицы) по вертикали: по верхнему краю (top), по центру (middle) или по низу (bottom)."}, {"num": 232, "question": "Атрибут, используемый для задания выравнивания элемента по вертикали", "options": {"A": "vertical-align", "B": "align", "C": "valign", "D": "vertical", "E": "top"}, "answer": "A", "explanation": "Тег <h4>. Заголовок четвертого уровня. Используется для еще более мелкой разбивки текста внутри подразделов."}, {"num": 233, "question": "Тег для создания заголовка четвертого уровня", "options": {"A": "<h4>", "B": "<h3>", "C": "<h5>", "D": "<header>", "E": "<heading>"}, "answer": "A", "explanation": "Атрибут color. Старый атрибут для тега <font>, менявший цвет букв. Сейчас так делать нельзя, нужно использовать CSS color."}, {"num": 234, "question": "Атрибут для задания цвета текста в теге <font>", "options": {"A": "color", "B": "text-color", "C": "font-color", "D": "style", "E": "font-style"}, "answer": "A", "explanation": "Тег <h4>. (Вопрос повторяет №232) Заголовок четвертого уровня."}, {"num": 235, "question": "Тег, используемый для создания заголовка четвертого уровня", "options": {"A": "<h4>", "B": "<h3>", "C": "<h5>", "D": "<header>", "E": "<heading>"}, "answer": "A", "explanation": "Свойство font-size. В CSS управляет размером букв текста (например, font-size: 16px; или font-size: 1.2rem;)."}, {"num": 236, "question": "Свойство CSS, используемое для задания размера текста", "options": {"A": "font-size", "B": "text-size", "C": "size", "D": "text-style", "E": "font-style"}, "answer": "A", "explanation": "Атрибут align (устарел) или CSS-свойства на родителе. В старом HTML тегу <table> давали align=\"center\", чтобы отцентровать всю таблицу. В современном CSS саму таблицу ровняют через внешние отступы margin: auto;."}, {"num": 237, "question": "Атрибут, используемый для задания выравнивания содержимого таблицы", "options": {"A": "align", "B": "valign", "C": "alignment", "D": "vertical-align", "E": "`text-align`"}, "answer": "E", "explanation": "Свойство border-style. (Вопрос повторяет №197/219) В CSS определяет внешний вид линии рамки (сплошная, пунктирная и т.д.)."}, {"num": 238, "question": "Свойство CSS, используемое для задания стиля границы", "options": {"A": "border-style", "B": "border", "C": "outline", "D": "frame", "E": "border-width"}, "answer": "A", "explanation": "Знак доллара $. В языке PHP абсолютно каждая переменная обязана начинаться со знака $, например: $myVariable."}, {"num": 239, "question": "Обозначает начало переменной в php", "options": {"A": "$", "B": "@", "C": "*", "D": "%", "E": "#"}, "answer": "A", "explanation": "Точка с запятой ;. Как и во многих языках, в PHP точка с запятой строго обозначает конец текущей инструкции (команды)."}, {"num": 240, "question": "Обозначает конец инструкции в php", "options": {"A": "#", "B": ";", "C": ":", "D": "@", "E": "$"}, "answer": "B", "explanation": "Просто знак доллара $. В PHP нет специальных ключевых слов вроде let или var. Переменная объявляется в момент её первого написания со знаком $: $x = 10;."}, {"num": 241, "question": "Используется для объявления переменной в php", "options": {"A": "int", "B": "bool", "C": "var", "D": "str", "E": "$name"}, "answer": "C", "explanation": "Тип данных int (Integer). Используется в PHP для работы с любыми целыми числами (положительными и отрицательными)."}, {"num": 242, "question": "Используется для хранения целых чисел в php", "options": {"A": "string", "B": "float", "C": "boolean", "D": "integer", "E": "char"}, "answer": "D", "explanation": "Оператор плюс +. Складывает значения двух переменных: $sum = $a + $b;."}, {"num": 243, "question": "Сложения двух переменных в php", "options": {"A": "+", "B": "-", "C": "*", "D": "/", "E": "%"}, "answer": "A", "explanation": "Конструкция if. Проверяет условие точно так же, как и в JavaScript: if ($condition) { ... }."}, {"num": 244, "question": "Используется для проверки условия в php", "options": {"A": "for", "B": "while", "C": "switch", "D": "if", "E": "do"}, "answer": "D", "explanation": "Число 1. Оператор % — это остаток от деления. Если 10 разделить на 3, то получится 3 целых и 1 в остатке (так как 3×3=9, а 10−9=1)."}, {"num": 245, "question": "Значение _________- присвоено переменной $result после выполнения следующего кода: $result = 10 % 3;", "options": {"A": "1", "B": "2", "C": "3", "D": "4", "E": "10"}, "answer": "B", "explanation": "Строка \"johndoe\". В коде ошибка (написана точка вместо знака вопроса для тернарного оператора), но судя по логике вопроса, это операция склейки. В PHP точка . используется для конкатенации строк, поэтому две строки просто скрепятся вместе без пробела."}, {"num": 246, "question": "Значение ___________ присвоено переменной $name после выполнения следующего кода: $name = \"john\" . \"doe\";", "options": {"A": "\"johndoe\"", "B": "\"john doe\"", "C": "\"john\"", "D": "\"doe\"", "E": "\"johndoedoe\""}, "answer": "A", "explanation": "Оператор точка .. В отличие от JavaScript, где строки склеивают плюсом, в PHP для этого используется обычная точка: $full_text = $str1 . $str2;."}, {"num": 247, "question": "Объединения двух строк в php", "options": {"A": "+", "B": "-", "C": "*", "D": "/", "E": "%"}, "answer": "A", "explanation": "Значение true (после исправления синтаксиса). В вопросе пропущен знак вопроса ?, правильный тернарный оператор выглядит так: ($score >= 60) ? true : false;. Так как 75 больше 60, условие выполняется, и переменная получает true."}, {"num": 248, "question": "Это значение предназначена для присвоения переменной $haspassed после выполнения следующего кода: $score = 75; $haspassed = ($score >= 60)  true : false;", "options": {"A": "true", "B": "false", "C": "75", "D": "60", "E": "0"}, "answer": "A", "explanation": "Тип данных float (также называют double). В PHP этот тип данных отвечает за хранение любых дробных чисел (чисел с плавающей точкой)."}, {"num": 249, "question": "Тип данных, который используется для хранения десятичных чисел в php", "options": {"A": "string", "B": "float", "C": "boolean", "D": "integer", "E": "char"}, "answer": "B", "explanation": ""}];
const total = questions.length;
let score = 0;
const pending = shuffle(Array.from({length: total}, (_, i) => i));
let wrongQueue = [];
let currentIndex = null;
const correctSet = new Set();
const remainingEl = document.getElementById('remaining');
const totalEl = document.getElementById('total');
const scoreEl = document.getElementById('score');
const progressFill = document.getElementById('progress-fill');
const qNumEl = document.getElementById('question-number');
const qEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const resultEl = document.getElementById('result');
const explEl = document.getElementById('explanation');
const nextBtn = document.getElementById('nextBtn');
const restartBtn = document.getElementById('restartBtn');
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}
function updateProgress() {
  const remaining = pending.length + wrongQueue.length + 1;
  remainingEl.textContent = remaining;
  totalEl.textContent = total;
  const answered = total - remaining;
  const percent = total ? Math.round((answered / total) * 100) : 100;
  progressFill.style.width = `${percent}%`;
}
function getNextQuestionIndex() {
  if (pending.length === 0) {
    if (wrongQueue.length === 0) {
      return null;
    }
    pending.push(...shuffle(wrongQueue.splice(0)));
  }
  return pending.shift();
}
function renderQuestion() {
  const nextIndex = getNextQuestionIndex();
  if (nextIndex === null) {
    showFinal();
    return;
  }
  currentIndex = nextIndex;
  const item = questions[currentIndex];
  updateProgress();
  qNumEl.textContent = `Вопрос ${item.num}`;
  qEl.textContent = item.question;
  optionsEl.innerHTML = '';
  resultEl.style.display = 'none';
  explEl.style.display = 'none';
  nextBtn.disabled = true;
  nextBtn.textContent = 'Следующий вопрос';
  const keys = Object.keys(item.options);
  for (const key of keys) {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.textContent = `${key}. ${item.options[key]}`;
    btn.dataset.key = key;
    btn.addEventListener('click', onSelect);
    optionsEl.appendChild(btn);
  }
}
function onSelect(event) {
  const key = event.currentTarget.dataset.key;
  const item = questions[currentIndex];
  const buttons = optionsEl.querySelectorAll('button');
  buttons.forEach(btn => {
    const btnKey = btn.dataset.key;
    btn.disabled = true;
    if (btnKey === item.answer) btn.classList.add('correct');
    if (btnKey === key && key !== item.answer) btn.classList.add('wrong');
  });
  const correct = key === item.answer;
  if (correct) {
    if (!correctSet.has(currentIndex)) {
      correctSet.add(currentIndex);
      score += 10;
      scoreEl.textContent = score;
    }
    wrongQueue = wrongQueue.filter(i => i !== currentIndex);
  } else {
    if (!wrongQueue.includes(currentIndex)) {
      wrongQueue.push(currentIndex);
    }
  }
  resultEl.style.display = 'block';
  resultEl.textContent = correct ? 'Верно! Отлично.' : `Неверно. Правильный ответ: ${item.answer}.`;
  if (item.explanation) {
    explEl.style.display = 'block';
    explEl.textContent = item.explanation;
  }
  nextBtn.disabled = false;
  if (pending.length === 0 && wrongQueue.length === 0) {
    nextBtn.textContent = 'Узнать результат';
  }
}
nextBtn.addEventListener('click', () => {
  renderQuestion();
});
restartBtn.addEventListener('click', () => {
  pending.splice(0, pending.length, ...shuffle(Array.from({length: total}, (_, i) => i)));
  wrongQueue = [];
  correctSet.clear();
  score = 0;
  scoreEl.textContent = score;
  nextBtn.textContent = 'Следующий вопрос';
  nextBtn.style.display = 'inline-block';
  restartBtn.style.display = 'none';
  renderQuestion();
});
function showFinal() {
  optionsEl.innerHTML = '';
  qNumEl.textContent = 'Финиш';
  qEl.textContent = `Вы набрали ${score} из ${total * 10} возможных.`;
  resultEl.style.display = 'block';
  resultEl.textContent = 'Все вопросы отвечены правильно!';
  explEl.style.display = 'none';
  nextBtn.disabled = true;
  nextBtn.style.display = 'none';
  restartBtn.style.display = 'inline-block';
}
renderQuestion();
</script>
</body>
</html>
