<!DOCTYPE html>
<html lang='ru'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>Квиз в стиле Kahoot</title>
<style>
body{font-family:Arial,sans-serif;background:radial-gradient(circle at top,#4b79a1,#283e51);color:#fff;margin:0;min-height:100vh;}
.container{max-width:1000px;margin:0 auto;padding:16px;}
.header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px;}
.header h1{font-size:1.9rem;margin:0;flex:1 1 100%;}
.status-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
.status-item{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.14);padding:12px 14px;border-radius:16px;font-size:.95rem;box-shadow:0 12px 28px rgba(0,0,0,.16);}
.progress-container{width:100%;background:rgba(255,255,255,.15);height:12px;border-radius:999px;overflow:hidden;margin-top:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12);}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#38bdf8,#22c55e);transition:width .35s ease;}
.card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:24px;padding:22px;margin-top:24px;box-shadow:0 22px 60px rgba(0,0,0,.32);}
.question-number{font-size:.95rem;opacity:.85;margin-bottom:12px;}
.question{font-size:1.54rem;line-height:1.45;margin-bottom:22px;}
.options{display:grid;grid-template-columns:1fr;gap:14px;}
.option-btn{border:none;padding:18px 20px;border-radius:18px;font-size:1rem;cursor:pointer;text-align:left;transition:.22s;box-shadow:0 12px 22px rgba(0,0,0,.18);color:#1f2937;background:#f8fafc;min-height:64px;}
.option-btn:hover{transform:translateY(-2px);}
.option-btn.correct{background:#22c55e;color:#fff;}
.option-btn.wrong{background:#ef4444;color:#fff;}
.footer{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-top:22px;}
.footer button{padding:16px 24px;border:none;border-radius:16px;font-size:1rem;cursor:pointer;background:#38bdf8;color:#1e293b;transition:.18s;}
.footer button:hover{background:#0ea5e9;}
.result{margin-top:16px;padding:18px;border-radius:16px;background:rgba(0,0,0,.24);}
.explanation{margin-top:14px;padding:18px;border-radius:16px;background:rgba(255,255,255,.08);color:#f8fafc;font-size:1rem;line-height:1.7;}
@media (max-width:680px){
  .container{padding:14px;}
  .header h1{font-size:1.6rem;}
  .status-item{flex:1 1 100%;justify-content:space-between;}
  .question{font-size:1.28rem;}
  .option-btn{font-size:1rem;min-height:70px;}
  .footer button{width:100%;}
}
</style>
</head>
<body>
<div class='container'>
<div class='header'>
<h1>Квиз в стиле Kahoot</h1>
<div class='status-bar'>
  <div class='status-item'>Осталось: <strong id='remaining'>247</strong></div>
  <div class='status-item'>Всего: <strong id='total'>247</strong></div>
  <div class='status-item'>Баллы: <strong id='score'>0</strong></div>
</div>
<div class='progress-container'><div class='progress-fill' id='progress-fill'></div></div>
</div>
<div class='card'>
<div class='question-number' id='question-number'></div>
<div class='question' id='question'></div>
<div class='options' id='options'></div>
<div class='result' id='result' style='display:none;'></div>
<div class='explanation' id='explanation' style='display:none;'></div>
<div class='footer'>
<button id='nextBtn' disabled>Следующий вопрос</button>
<button id='restartBtn' style='display:none;'>Пройти заново</button>
</div>
</div>
</div>
<script>
const questions = [{"num": 1, "question": "Тип данных, который представляет логические значения в JavaScript", "options": {"A": "boolean", "B": "char", "C": "int", "D": "number", "E": "string"}, "answer": "A", "explanation": "Тип Boolean (Логический). Это как выключатель света — у него есть всего два положения: либо включено (true), либо выключено (false)."}, {"num": 2, "question": "Тип данных, который представляет целые числа в JavaScript", "options": {"A": "number", "B": "int", "C": "Integer", "D": "long", "E": "float"}, "answer": "A", "explanation": "Тип Number (Числа). Используется для любых чисел — и целых (как 5), и дробных (как 5.5). Если число ну очень огромное, есть редкий отдельный тип BigInt."}, {"num": 3, "question": "Тип данных, который представляет текстовые строки в JavaScript", "options": {"A": "string", "B": "char", "C": "int", "D": "boolean", "E": "byte"}, "answer": "A", "explanation": "Тип String (Строки). Это любой текст. Чтобы компьютер понял, что это текст, его просто заматывают в кавычки: 'привет', \"мир\" или `тест`."}, {"num": 4, "question": "Тип данных, который представляет массивы в JavaScript", "options": {"A": "array", "B": "list", "C": "vector", "D": "Set", "E": "Object"}, "answer": "E", "explanation": "Тип Object (Объекты). В JavaScript у массивов нет своего личного типа. Массив — это просто особая разновидность объекта, которая умеет хранить списки вещей по порядку."}, {"num": 5, "question": "Тип данных, который используется для работы с датами в JavaScript", "options": {"A": "Date", "B": "date", "C": "calendar", "D": "datetime", "E": "time"}, "answer": "A", "explanation": "Тип Object (Объекты). Даты — это тоже не какой-то особый тип данных, а встроенный в язык объект, который умеет считать время и дни."}, {"num": 6, "question": "Способ объявления константы в JavaScript", "options": {"A": "final const MY_CONSTANT = 42;", "B": "const MY_CONSTANT = 42;", "C": "let MY_CONSTANT = 42;", "D": "static const MY_CONSTANT = 42;", "E": "var MY_CONSTANT = 42;"}, "answer": "B", "explanation": "Ключевое слово const. Это способ создать «железную» коробку. Положил туда значение один раз — и поменять его внутри кода уже не получится."}, {"num": 7, "question": "Способ объявления переменной типа number с именем \"myNumber\" в JavaScript", "options": {"A": "number myNumber;", "B": "var myNumber = 0;", "C": "int myNumber = 0;", "D": "var number = myNumber;", "E": "let number = 0;"}, "answer": "B", "explanation": "Создание числовой переменной. Пишем let, имя переменной и через равно даем ей число. Компьютер сам поймет, что это число:"}, {"num": 8, "question": "Способ объявления переменной в глобальной области видимости в JavaScript", "options": {"A": "global", "B": "var", "C": "let", "D": "const", "E": "public"}, "answer": "B", "explanation": "Глобальная область. Если объявить переменную через let или const на самой первой строчке файла (вне любых функций), её будет видно вообще везде в этом файле."}, {"num": 9, "question": "Способ объявления переменной с блочной областью видимости в JavaScript", "options": {"A": "block", "B": "var", "C": "let", "D": "const", "E": "static"}, "answer": "C", "explanation": "Блочная область (внутри {}). Если создать переменную через let или const внутри фигурных скобок (например, внутри цикла или условия), то за пределами этих скобок она сотрется и работать не будет."}, {"num": 10, "question": "Способ объявления переменной, которая не может быть переопределена, в JavaScript", "options": {"A": "const", "B": "let", "C": "var", "D": "static", "E": "final"}, "answer": "A", "explanation": "Константа (const). Защищает переменную от перезаписи. Если попытаться насильно записать туда новое значение, код выдаст ошибку и сломается."}, {"num": 11, "question": "Способ объявления функции в JavaScript", "options": {"A": "func myFunction() {}", "B": "def myFunction() {}", "C": "function myFunction() {}", "D": "fun myFunction() {}", "E": "var myFunction() {}"}, "answer": "C", "explanation": "Создание функции. Функция — это запечатанная инструкция (команда). Пишем слово function, даем ей имя и ставим скобки:"}, {"num": 12, "question": "Способ вызова функции myFunction в JavaScript", "options": {"A": "call myFunction();", "B": "invoke myFunction();", "C": "myFunction.call();", "D": "myFunction();", "E": "myFunction.invoke();"}, "answer": "D", "explanation": "Вызов функции. Чтобы запустить отложенную инструкцию, пишем её имя и круглые скобки:"}, {"num": 13, "question": "Способ определения функции с использованием стрелочной функции в JavaScript", "options": {"A": "const myFunction = () => {};", "B": "let myFunction = function() {};", "C": "function myFunction() {};", "D": "myFunction = () => {};", "E": "arrow myFunction = () => {}"}, "answer": "A", "explanation": "Стрелочная функция. Это просто современный, укороченный способ записать функцию, используя стрелочку =>:"}, {"num": 14, "question": "Способ объявления анонимной функции в JavaScript", "options": {"A": "function() {};", "B": "() => {};", "C": "func() {};", "D": "anonymous function() {};", "E": "lambda() {};"}, "answer": "A", "explanation": "Анонимная функция. Это функция-безымяшка. У неё нет своего имени, её обычно сразу дарят другой функции или кладут в переменную:"}, {"num": 15, "question": "Способ передачи функции как аргумента в JavaScript", "options": {"A": "function myFunc(callback()) {}", "B": "function myFunc(function callback) {}", "C": "function myFunc(callback) {}", "D": "function myFunc(func callback) {}", "E": "function myFunc(lambda callback) {}"}, "answer": "C", "explanation": "Передача функции в аргумент. В JavaScript функции можно передавать как обычные вещи (числа или строки) внутрь других функций, чтобы те запустили их позже."}, {"num": 16, "question": "Способ создания массива в JavaScript", "options": {"A": "let myArray = [];", "B": "let myArray = {};", "C": "array myArray = [];", "D": "let myArray = Array();", "E": "int[] myArray = [];"}, "answer": "A", "explanation": "Создание массива. Проще всего открыть квадратные скобки [] и перечислить внутри всё через запятую:"}, {"num": 17, "question": "Способ обращения к первому элементу массива myArray в JavaScript", "options": {"A": "myArray(0)", "B": "myArray[0]", "C": "myArray{0}", "D": "myArray<0>", "E": "myArray-0"}, "answer": "B", "explanation": "Первый элемент массива. Компьютер считает с нуля. Поэтому у самого первого элемента индекс всегда 0:"}, {"num": 18, "question": "Метод, который добавляет элемент в конец массива в JavaScript", "options": {"A": "append()", "B": "add()", "C": "push()", "D": "insert()", "E": "concat()"}, "answer": "C", "explanation": "Метод push(). Эта команда берет новую вещь и запрыгивает с ней в самый хвост (конец) вашего списка-массива."}, {"num": 19, "question": "Метод, который удаляет последний элемент массива в JavaScript", "options": {"A": "pop()", "B": "remove()", "C": "delete()", "D": "shift()", "E": "unshift()"}, "answer": "A", "explanation": "Метод pop(). Эта команда, наоборот, отрезает и выбрасывает самый последний элемент из конца массива."}, {"num": 20, "question": "Способ создания пустого объекта в JavaScript", "options": {"A": "let obj = {};", "B": "let obj = [];", "C": "let obj = null;", "D": "let obj = undefined;", "E": "let obj = new Object();"}, "answer": "A", "explanation": "Создание пустого объекта. Объект — это шкафчик, где хранятся вещи в формате «имя: значение». Пустой шкаф создается фигурными скобками {}:"}, {"num": 21, "question": "Оператор, который используется для присвоения значения переменной в JavaScript", "options": {"A": "==", "B": "=", "C": ":=", "D": "=>", "E": "->"}, "answer": "B", "explanation": "Знак равенства =. В программировании один знак = не сравнивает, а берет значение справа и записывает в переменную слева."}, {"num": 22, "question": "Оператор, который используется для проверки равенства без приведения типов в JavaScript", "options": {"A": "==", "B": "=", "C": "===", "D": "!=", "E": "<=>"}, "answer": "C", "explanation": "Строгое равенство ===. Три равно проверяют честно: равны ли значения и совпадает ли их тип. Строка \"5\" и число 5 для него будут разными вещами."}, {"num": 23, "question": "Оператор, который используется для проверки неравенства без приведения типов в JavaScript", "options": {"A": "!=", "B": "<>", "C": "!==", "D": "=!", "E": "/="}, "answer": "C", "explanation": "Строгое неравенство !==. Проверяет, что две вещи абсолютно разные по значению или по типу."}, {"num": 24, "question": "Оператор, который используется для сложения в JavaScript", "options": {"A": "+", "B": "–", "C": "*", "D": "/", "E": "%"}, "answer": "A", "explanation": "Плюс + для чисел. Обычная математика: складывает два числа между собой."}, {"num": 25, "question": "Оператор, который используется для конкатенации строк в JavaScript", "options": {"A": "&", "B": "+", "C": "Concat", "D": "Append", "E": "|"}, "answer": "B", "explanation": "Плюс + для текста. Если склеить текст с текстом (или текст с числом), они просто скрепятся в одну длинную строчку: \"супер\" + \"код\" станет \"суперкод\"."}, {"num": 26, "question": "Способ объявления строки в JavaScript", "options": {"A": "let myString = \"Hello\";", "B": "let myString = 'Hello';", "C": "let myString = Hello;", "D": "All of the above", "E": "None of the above"}, "answer": "D", "explanation": "Объявление строки. Просто пишем любой текст внутри кавычек:"}, {"num": 27, "question": "Метод, который возвращает количество символов в строке в JavaScript", "options": {"A": "length()", "B": "count()", "C": "size()", "D": "len()", "E": "length"}, "answer": "E", "explanation": "Свойство .length. Пишется в конце строки без круглых скобок и мгновенно говорит, сколько букв (символов) в этой строке."}, {"num": 28, "question": "Метод, который возвращает подстроку в JavaScript", "options": {"A": "substr()", "B": "substring()", "C": "slice()", "D": "All of the above", "E": "None of the above"}, "answer": "D", "explanation": "Метод .slice(). Позволяет «откусить» кусок от строки, указав, с какой по какую букву тебе нужно забрать."}, {"num": 29, "question": "Метод, который преобразует строку в верхний регистр в JavaScript", "options": {"A": "toUpperCase()", "B": "toUpper()", "C": "upper()", "D": "toUpperCase", "E": "upperCase()"}, "answer": "A", "explanation": "Метод .toUpperCase(). Делает все буквы в строке КАПСОМ (большими)."}, {"num": 30, "question": "Метод, который преобразует строку в нижний регистр в JavaScript", "options": {"A": "toLowerCase()", "B": "toLower()", "C": "lower()", "D": "toLowerCase", "E": "lowerCase()"}, "answer": "A", "explanation": "Метод .toLowerCase(). Делает все буквы в строке маленькими."}, {"num": 31, "question": "Способ преобразования строки \"123\" в число в JavaScript", "options": {"A": "Number(\"123\")", "B": "parseInt(\"123\")", "C": "+\"123\"", "D": "All of the above", "E": "None of the above"}, "answer": "D", "explanation": "Строку в число. Проще всего поставить обычный плюс перед строкой: +\"123\" превратится в настоящее число 123."}, {"num": 32, "question": "Способ преобразования числа в строку в JavaScript", "options": {"A": "String(123)", "B": "123.toString()", "C": "123 + \"\"", "D": "All of the above", "E": "None of the above"}, "answer": "D", "explanation": "Число в строку. Вызываем у числа команду .toString(), и оно превращается в текст, который теперь нельзя складывать математически."}, {"num": 33, "question": "Способ преобразования логического значения в строку в JavaScript", "options": {"A": "String(true)", "B": "true.toString()", "C": "true + \"\"", "D": "All of the above", "E": "None of the above"}, "answer": "D", "explanation": "Логическое в строку. Команда .toString() превратит логическое true в обычное слово \"true\"."}, {"num": 34, "question": "Способ проверки типа переменной в JavaScript", "options": {"A": "typeof variable;", "B": "type variable;", "C": "kindof variable;", "D": "varType variable;", "E": "isType variable;"}, "answer": "A", "explanation": "Оператор typeof. Инструмент-сканер. Пишешь перед переменной typeof x, и он текстом отвечает, что там лежит: \"number\", \"string\" и так далее."}, {"num": 35, "question": "Способ преобразования объекта в JSON строку в JavaScript", "options": {"A": "JSON.stringify(obj);", "B": "JSON.parse(obj);", "C": "obj.toString();", "D": "obj.stringify();", "E": "obj.parse();"}, "answer": "A", "explanation": "Превращение объекта в JSON. Команда JSON.stringify(объект) берет сложный объект и переделывает его в одну длинную строку, чтобы её можно было отправить по интернету."}, {"num": 36, "question": "Способ написания условного оператора в JavaScript", "options": {"A": "if (condition) {}", "B": "if condition {}", "C": "if [condition] {}", "D": "if {condition} {}", "E": "if (condition);"}, "answer": "A", "explanation": "Условие if. Говорит компьютеру: «Если то, что в скобках — правда, то сделай код из фигурных скобок»:"}, {"num": 37, "question": "Способ написания оператора switch в JavaScript", "options": {"A": "switch (expression) { case value: break; }", "B": "switch expression { case value: break; }", "C": "switch [expression] { case value: break; }", "D": "switch {expression} { case value: break; }", "E": "switch (expression); case value: break;"}, "answer": "A", "explanation": "Переключатель switch. Удобно, когда у тебя есть одна переменная и много четких вариантов для неё. Заменяет кучу скучных if / else."}, {"num": 38, "question": "Способ написания цикла for в JavaScript", "options": {"A": "for (let i = 0; i < 10; i++) {}", "B": "for i = 0; i < 10; i++ {}", "C": "for (let i = 0; i < 10; i++) {}", "D": "for i = 0 to 10 {}", "E": "for (let i = 0; i < 10; i++);"}, "answer": "A", "explanation": "Цикл for. Крутит код по кругу заданное количество раз (например, ровно 10 раз), пока работает встроенный счетчик."}, {"num": 39, "question": "Способ написания цикла while в JavaScript", "options": {"A": "while (condition) {}", "B": "while condition {}", "C": "while [condition] {}", "D": "while {condition} {}", "E": "while (condition);"}, "answer": "A", "explanation": "Цикл while. Крутит код по кругу до тех пор, пока условие в скобках остается правдой. Может крутиться бесконечно, если условие никогда не испортится."}, {"num": 40, "question": "Способ выхода из цикла в JavaScript", "options": {"A": "break", "B": "exit", "C": "stop", "D": "return", "E": "end"}, "answer": "A", "explanation": "Команда break. Кнопка экстренного выхода. Если компьютер видит внутри цикла слово break, он бросает цикл и бежит дальше."}, {"num": 41, "question": "Способ написания блока try-catch в JavaScript", "options": {"A": "try {} catch (error) {}", "B": "try {} except (error) {}", "C": "try {} catch error {}", "D": "try {} except error {}", "E": "try {} catch (Exception e) {}"}, "answer": "A", "explanation": "Конструкция try...catch. Подушка безопасности. Код в try пытается выполниться, а если там случится авария, программа не закроется, а управление уйдет в блок catch, где ошибку можно починить или записать."}, {"num": 42, "question": "Способ генерации исключения в JavaScript", "options": {"A": "throw new Error(\"message\");", "B": "raise new Error(\"message\");", "C": "throw Error(\"message\");", "D": "raise Error(\"message\");", "E": "generate Error(\"message\");"}, "answer": "A", "explanation": "Оператор throw. Ручной вызов аварии. Если в коде пошло что-то не так, мы можем сами закричать «Ошибка!» с помощью throw new Error(\"текст\")."}, {"num": 43, "question": "Способ добавления блока finally в try-catch в JavaScript", "options": {"A": "try {} catch (error) {} finally {}", "B": "try {} catch (error) {} final {}", "C": "try {} catch (error) {} end {}", "D": "try {} catch (error) {} finish {}", "E": "try {} catch (error) {} done {}"}, "answer": "A", "explanation": "Блок finally. Дополнение к блоку аварий. Код внутри finally выполнится на 100% в любом случае: и если всё прошло идеально, и если всё сломалось."}, {"num": 44, "question": "Способ проверки наличия ошибки в JavaScript", "options": {"A": "try {} catch (error) { if (error) {} }", "B": "try {} catch (error) { if (error.message) {} }", "C": "try {} catch (error) { if (error.code) {} }", "D": "try {} catch (error) { if (error) {} }", "E": "try {} catch (error) { if (error.type) {} }"}, "answer": "D", "explanation": "Проверка ошибки в catch. Когда ловится ошибка, внутри catch(error) у нас появляется объект этой ошибки. У него можно спросить имя или текст сообщения, чтобы понять, что сломалось."}, {"num": 45, "question": "Способ определения собственного класса ошибки в JavaScript", "options": {"A": "class MyError extends Error {}", "B": "class MyError inherits Error {}", "C": "class MyError extends Exception {}", "D": "class MyError inherits Exception {}", "E": "class MyError implements Error {}"}, "answer": "A", "explanation": "Свой класс ошибки. Создание своей личной ошибки (например, ОшибкаОплаты) на основе стандартной с помощью слова extends:"}, {"num": 46, "question": "Способ экспорта функции в JavaScript", "options": {"A": "export function myFunction() {}", "B": "module.export function myFunction() {}", "C": "export default function myFunction() {}", "D": "function export myFunction() {}", "E": "export myFunction() {}"}, "answer": "A", "explanation": "Слово export. Ставится перед функцией, чтобы разрешить другим файлам брать её и использовать у себя."}, {"num": 47, "question": "Способ импорта модуля в JavaScript", "options": {"A": "import myModule from 'module';", "B": "require('module');", "C": "load('module');", "D": "import 'module';", "E": "include 'module';"}, "answer": "A", "explanation": "Слово import. Притаскивает в текущий файл функцию, которую кто-то разрешил взять из другого файла с помощью export."}, {"num": 48, "question": "Способ импорта всех экспортируемых объектов из модуля в JavaScript", "options": {"A": "import * as myModule from 'module';", "B": "import all from 'module';", "C": "import * from 'module';", "D": "require all from 'module';", "E": "import { * } from 'module';"}, "answer": "A", "explanation": "Импорт всего (* as). Забирает из чужого файла вообще всё, что там разрешено к экспорту, и аккуратно складывает в один общий объект."}, {"num": 49, "question": "Способ экспорта по умолчанию в JavaScript", "options": {"A": "export default myFunction;", "B": "export function myFunction() {};", "C": "module.export default myFunction;", "D": "function export default myFunction() {};", "E": "export myFunction;"}, "answer": "A", "explanation": "Главный экспорт (export default). Говорит, что эта функция — самая главная в файле. Такой экспорт может быть только один на весь файл."}, {"num": 50, "question": "Способ импорта экспортированного по умолчанию объекта в JavaScript", "options": {"A": "import myModule from 'module';", "B": "import { myModule } from 'module';", "C": "import * as myModule from 'module';", "D": "import default myModule from 'module';", "E": "import module from 'module';"}, "answer": "A", "explanation": "Импорт главного экспорта. Когда мы забираем главную вещь из файла, нам не нужны фигурные скобки, и мы можем назвать её у себя в файле абсолютно любым именем."}, {"num": 51, "question": "Способ получения элемента по ID в JavaScript", "options": {"A": "document.getElementById('id');", "B": "document.getElement('id');", "C": "document.querySelector('#id');", "D": "Both A and C", "E": "None of the above"}, "answer": "D", "explanation": "Метод document.getElementById(). Находит на странице один конкретный элемент, у которого в HTML прописан уникальный id:"}, {"num": 52, "question": "Способ получения элементов по классу в JavaScript", "options": {"A": "document.getElementsByClassName('class');", "B": "document.querySelectorAll('.class');", "C": "document.getClass('class');", "D": "Both A and B", "E": "None of the above"}, "answer": "D", "explanation": "Метод document.getElementsByClassName() или современный document.querySelectorAll(). Собирают со страницы целую коллекцию (список) элементов, у которых совпадает имя класса."}, {"num": 53, "question": "Способ изменения текста элемента в JavaScript", "options": {"A": "element.textContent = 'text';", "B": "element.innerText = 'text';", "C": "element.innerHTML = 'text';", "D": "All of the above", "E": "None of the above"}, "answer": "D", "explanation": "Свойство textContent. Позволяет стереть старый текст внутри элемента и записать туда новый:"}, {"num": 54, "question": "Способ добавления класса к элементу в JavaScript", "options": {"A": "element.classList.add('class');", "B": "element.className = 'class';", "C": "element.addClass('class');", "D": "Both A and B", "E": "None of the above"}, "answer": "A", "explanation": "Команда element.classList.add(). Навешивает на элемент новый CSS-класс, чтобы применить к нему новые стили или анимацию."}, {"num": 55, "question": "Способ удаления класса из элемента в JavaScript", "options": {"A": "element.classList.remove('class');", "B": "element.className = '';", "C": "element.removeClass('class');", "D": "Both A and B", "E": "None of the above"}, "answer": "A", "explanation": "Команда element.classList.remove(). Стирает CSS-класс с элемента, убирая привязанные к этому классу стили."}, {"num": 56, "question": "Способ добавления обработчика события в JavaScript", "options": {"A": "element.addEventListener('event', handler);", "B": "element.on('event', handler);", "C": "element.attachEvent('event', handler);", "D": "element.onEvent('event', handler);", "E": "element.event(handler);"}, "answer": "A", "explanation": "Метод addEventListener(). Подслушивает действия пользователя. Мы говорим ему, какое событие ждать (например, клик мышкой 'click'), и какую функцию запустить, когда это произойдет:"}, {"num": 57, "question": "Способ удаления обработчика события в JavaScript", "options": {"A": "element.removeEventListener('event', handler);", "B": "element.off('event', handler);", "C": "element.detachEvent('event', handler);", "D": "element.unbind('event', handler);", "E": "element.noEvent('event', handler);"}, "answer": "A", "explanation": "Метод removeEventListener(). Заставляет элемент перестать слушать событие и реагировать на него. Работает только если передать ему ту же самую функцию, что была добавлена."}, {"num": 58, "question": "Способ предотвращения действия по умолчанию в JavaScript", "options": {"A": "event.preventDefault();", "B": "event.stop();", "C": "event.prevent();", "D": "event.stopPropagation();", "E": "event.cancel();"}, "answer": "A", "explanation": "Метод event.preventDefault(). Говорит браузеру: «Не делай то, что ты делаешь обычно». Например, останавливает перезагрузку страницы при отправке формы или не дает перейти по ссылке при клике."}, {"num": 59, "question": "Способ остановки распространения события в JavaScript", "options": {"A": "event.stopPropagation();", "B": "event.stop();", "C": "event.prevent();", "D": "event.preventDefault();", "E": "event.cancel();"}, "answer": "A", "explanation": "Метод event.stopPropagation(). Останавливает «всплытие» события. Клик на кнопку больше не полетит вверх к её родительским блокам и не активирует их обработчики."}, {"num": 60, "question": "Способ проверки типа события в JavaScript", "options": {"A": "event.type", "B": "event.name", "C": "event.kind", "D": "event.eventType", "E": "event.category"}, "answer": "A", "explanation": "Свойство event.type. Показывает строку с названием события, которое прямо сейчас произошло (например, вернет \"click\" или \"keydown\")."}, {"num": 61, "question": "Способ объявления асинхронной функции в JavaScript", "options": {"A": "async function myFunction() {}", "B": "function async myFunction() {}", "C": "function myFunction() async {}", "D": "async myFunction function() {}", "E": "function myFunction() async {}"}, "answer": "A", "explanation": "Слово async перед функцией. Магическое слово, которое превращает обычную функцию в асинхронную. Такая функция внутри себя позволяет ставить код «на паузу» и всегда возвращает обещание (промис):"}, {"num": 62, "question": "Способ использования оператора await в JavaScript", "options": {"A": "let result = await promise;", "B": "let result = await(promise);", "C": "let result = promise.await();", "D": "let result = promise.await;", "E": "let result = await.promise;"}, "answer": "A", "explanation": "Оператор await. Ставится только внутри async-функции прямо перед долгим процессом (например, скачиванием файла). Он буквально замораживает выполнение кода на этой строчке, пока процесс не завершится."}, {"num": 63, "question": "Способ создания промиса в JavaScript", "options": {"A": "new Promise((resolve, reject) => {});", "B": "Promise.create((resolve, reject) => {});", "C": "let promise = new Promise();", "D": "promise = new Promise((resolve, reject) => {});", "E": "new Promise(resolve => {});"}, "answer": "A", "explanation": "Конструктор new Promise(). Это коробка-обещание. Мы даем ей задачу и две встроенные кнопки: resolve (если всё прошло успешно) и reject (если случилась беда):"}, {"num": 64, "question": "Способ обработки успешного завершения промиса в JavaScript", "options": {"A": "promise.then(result => {});", "B": "promise.catch(error => {});", "C": "promise.finally(() => {});", "D": "promise.complete(result => {});", "E": "promise.success(result => {});"}, "answer": "A", "explanation": "Метод .then(). Прицепляется к промису и ждет, пока тот успешно выполнится. Как только обещание сработает, код внутри .then() заберет результат."}, {"num": 65, "question": "Способ обработки ошибки в промисе в JavaScript", "options": {"A": "promise.then(result => {}).catch(error => {});", "B": "promise.catch(error => {}).then(result => {});", "C": "promise.finally(() => {}).catch(error => {});", "D": "promise.complete(() => {}).catch(error => {});", "E": "promise.error(error => {}).then(result => {});"}, "answer": "A", "explanation": "Метод .catch(). Прицепляется к промису для ловли ошибок. Если в промисе что-то сломалось или сработал reject, управление мгновенно улетит сюда."}, {"num": 66, "question": "Способ создания регулярного выражения в JavaScript", "options": {"A": "let regex = /pattern/;", "B": "let regex = new RegExp('pattern');", "C": "let regex = RegExp('pattern');", "D": "Both A and B", "E": "All of the above"}, "answer": "E", "explanation": "Регулярное выражение (RegExp). Это специальный шаблон для поиска букв или цифр в тексте. Проще всего создать его, зажав правила между двумя косыми чертами:"}, {"num": 67, "question": "Способ проверки строки на соответствие регулярному выражению в JavaScript", "options": {"A": "regex.test(string);", "B": "string.match(regex);", "C": "string.test(regex);", "D": "Both A and B", "E": "All of the above"}, "answer": "D", "explanation": "Метод regex.test(). Берет регулярное выражение и проверяет строку. Если в строке нашлось то, что мы искали, выдает true, если нет — false."}, {"num": 68, "question": "Способ поиска совпадений в строке с регулярным выражением в JavaScript", "options": {"A": "string.match(regex);", "B": "string.search(regex);", "C": "regex.exec(string);", "D": "Both A and C", "E": "All of the above"}, "answer": "E", "explanation": "Метод string.match(). Ищет в строке совпадения по нашему шаблону и возвращает их в виде готового массива."}, {"num": 69, "question": "Способ замены части строки по регулярному выражению в JavaScript", "options": {"A": "string.replace(regex, 'replacement');", "B": "string.substitute(regex, 'replacement');", "C": "string.change(regex, 'replacement');", "D": "regex.replace(string, 'replacement');", "E": "regex.substitute(string, 'replacement');"}, "answer": "A", "explanation": "Метод string.replace(). Находит по шаблону кусок текста в строке и заменяет его на другое слово."}, {"num": 70, "question": "Способ поиска индекса первого совпадения по регулярному выражению в строке в JavaScript", "options": {"A": "string.search(regex);", "B": "string.indexOf(regex);", "C": "regex.search(string);", "D": "regex.indexOf(string);", "E": "string.find(regex);"}, "answer": "A", "explanation": "Метод string.search(). Ищет шаблон в строке и возвращает номер (индекс) первой буквы, где началось совпадение. Если ничего не нашлось, вернет -1."}, {"num": 71, "question": "Способ создания объекта Date в JavaScript", "options": {"A": "let date = new Date();", "B": "let date = Date();", "C": "let date = new date();", "D": "let date = Date.create();", "E": "let date = create Date();"}, "answer": "A", "explanation": "Конструктор new Date(). Создает специальный объект-календарь, с которым можно удобно работать."}, {"num": 72, "question": "Способ получения текущей даты и времени в JavaScript", "options": {"A": "let now = new Date();", "B": "let now = Date.now();", "C": "let now = new Date().getTime();", "D": "Both A and B", "E": "All of the above"}, "answer": "D", "explanation": "Пустой new Date(). Если вызвать его без цифр внутри скобок, он автоматически захватит точное текущее время и дату с твоего устройства."}, {"num": 73, "question": "Способ получения года из объекта Date в JavaScript", "options": {"A": "date.getFullYear();", "B": "date.getYear();", "C": "date.year();", "D": "date.fullYear();", "E": "date.getYear;"}, "answer": "A", "explanation": "Метод .getFullYear(). Вытаскивает из объекта даты чистый четырехзначный год (например, 2026)."}, {"num": 74, "question": "Способ получения месяца из объекта Date в JavaScript", "options": {"A": "date.getMonth();", "B": "date.getMonth + 1;", "C": "date.month();", "D": "date.month;", "E": "date.getMonth;"}, "answer": "A", "explanation": "Метод .getMonth(). Вытаскивает номер месяца. Важно: месяцы считаются с нуля, поэтому январь — это 0, а декабрь — 11."}, {"num": 75, "question": "Способ получения дня недели из объекта Date в JavaScript", "options": {"A": "date.getDay();", "B": "date.getDate();", "C": "date.day();", "D": "date.weekday();", "E": "date.getWeekday();"}, "answer": "A", "explanation": "Метод .getDay(). Возвращает номер дня недели. Во многих странах отсчет идет с воскресенья, поэтому воскресенье — это 0, понедельник — 1, а суббота — 6."}, {"num": 76,
